<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f1a;--surface:#111520;--surface2:#171d2e;--surface3:#1e2640;
  --border:#232d45;--border2:#2e3a58;
  --text:#dde4f0;--muted:#6b7a99;--dim:#3d4e6e;
  --blue:#5b8dee;--blue-bg:rgba(91,141,238,.10);
  --purple:#9b7cf4;--purple-bg:rgba(155,124,244,.10);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,.10);
  --green:#3ecf8e;--green-bg:rgba(62,207,142,.10);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,.10);
  --red:#e85d75;--red-bg:rgba(232,93,117,.10);
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue);letter-spacing:.05em;margin-right:4px}
.logo span{color:var(--muted);font-weight:400}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.dialect-select{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:4px 8px;cursor:pointer;outline:none}
.cat-selector{display:flex;align-items:center;gap:8px;flex-shrink:0}
.cat-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);white-space:nowrap;flex-shrink:0}
.cat-dropdown{font-family:var(--sans);font-size:12px;font-weight:500;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:4px 8px;cursor:pointer;outline:none;min-width:180px;transition:border-color .15s}
.cat-dropdown:focus{border-color:var(--purple)}
.cat-dropdown option{background:var(--surface2)}
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:5px 12px;border-radius:5px;border:1px solid;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--muted)}
.btn-ghost:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.btn-teal{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}
.btn-teal:hover:not(:disabled){filter:brightness(1.15)}
.btn-green{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:600}
.btn-green:hover:not(:disabled){filter:brightness(1.15)}
.btn-blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.btn-blue:hover:not(:disabled){filter:brightness(1.15)}

/* Main layout */
.main{display:flex;flex:1;overflow:hidden}

/* Left panel */
.left{width:40%;min-width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tab{font-size:11px;font-weight:500;padding:9px 12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.panel{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;display:none}
.panel.active{display:block}

/* Problem panel */
.req-from{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.req-title{font-size:16px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:10px}
.req-summary{font-size:12.5px;color:#8a9ab8;line-height:1.7;margin-bottom:12px}
.req-list{margin:0 0 14px 16px;display:flex;flex-direction:column;gap:6px}
.req-list li{font-size:12.5px;color:#b0bdd0;line-height:1.6}
.req-divider{height:1px;background:var(--border);margin:12px 0}
.req-submitter{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
.req-submitter span{color:var(--text);font-weight:500}
.req-section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;margin-top:10px}

/* Schema */
.schema-tbl-name{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue);margin-bottom:4px;margin-top:12px}
.schema-tbl-name:first-child{margin-top:0}
.schema-tbl-desc{font-size:11px;color:var(--muted);margin-bottom:5px}
table.st{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px}
table.st th{background:var(--surface2);color:var(--muted);text-align:left;padding:4px 7px;border:1px solid var(--border);font-weight:500;font-size:10px}
table.st td{padding:3px 7px;border:1px solid var(--border);color:var(--text)}
table.st tr:nth-child(even) td{background:var(--surface2)}
.col-pk{color:var(--amber)}.col-type{color:var(--purple);font-family:var(--mono);font-size:10px}
.sample-label{font-size:10px;color:var(--dim);margin:7px 0 3px;letter-spacing:.05em;text-transform:uppercase;font-weight:600}
table.sd{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:12px;font-family:var(--mono)}
table.sd th{background:var(--surface3);color:var(--muted);padding:3px 6px;border:1px solid var(--border);text-align:left}
table.sd td{padding:3px 6px;border:1px solid var(--border);color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
table.sd tr:nth-child(even) td{background:var(--surface2)}
.result-table-wrap{overflow-x:auto}

/* Data tab */
.data-tab-header{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:12px 14px;margin-bottom:16px}
.data-tab-db-name{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--blue);margin-bottom:3px}
.data-tab-desc{font-size:11.5px;color:var(--muted);line-height:1.6}
.data-tab-stats{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.data-stat{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:10px;border:1px solid var(--border2);background:var(--surface3);color:var(--muted)}
.data-stat span{color:var(--text);font-weight:600}
.data-tbl-section{margin-bottom:20px}
.data-tbl-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.data-tbl-name{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue)}
.data-tbl-badge{font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:8px;background:var(--blue-bg);border:1px solid rgba(91,141,238,.3);color:var(--blue)}
.data-tbl-desc{font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.5}
table.dt{width:100%;border-collapse:collapse;font-size:10.5px;font-family:var(--mono)}
table.dt th{background:var(--surface3);color:var(--blue);padding:4px 7px;border:1px solid var(--border);white-space:nowrap;font-size:10px;font-weight:600;position:sticky;top:0;z-index:1}
table.dt td{padding:3px 7px;border:1px solid var(--border);color:var(--text);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
table.dt tr:nth-child(even) td{background:var(--surface2)}
table.dt td.null-cell{color:var(--dim);font-style:italic}
table.dt td.pk-cell{color:var(--amber)}
table.dt td.fk-cell{color:var(--teal)}
.data-scroll-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:5px}
.data-col-schema{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.data-col-pill{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;background:var(--surface3);border:1px solid var(--border);color:var(--muted)}
.data-col-pill.pk{border-color:rgba(245,166,35,.4);color:var(--amber)}
.data-col-pill.fk{border-color:rgba(45,212,191,.3);color:var(--teal)}

/* Diff tab */
.diff-intro{font-size:11.5px;color:var(--muted);margin-bottom:12px;line-height:1.6}
table.diff{width:100%;border-collapse:collapse;font-size:10px}
table.diff th{background:var(--surface3);padding:5px 7px;border:1px solid var(--border);text-align:left;font-size:10px;color:var(--muted);font-weight:600}
table.diff th.active-dialect{color:var(--blue);border-bottom:2px solid var(--blue)}
table.diff td{padding:4px 7px;border:1px solid var(--border);font-family:var(--mono);font-size:10px;vertical-align:top}
table.diff td:first-child{color:var(--text);font-family:var(--sans);font-size:11px}
table.diff td.hl{color:var(--blue);background:var(--blue-bg)}

/* Right panel */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lang-tag{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.lang-dot{width:7px;height:7px;border-radius:50%;background:var(--blue)}
.editor-btns{display:flex;gap:6px}
.editor-wrap{flex:1;position:relative;overflow:hidden;min-height:80px}
#editor{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;line-height:1.75;border:none;outline:none;resize:none;padding:16px 16px 16px 48px;tab-size:2}
.lnums{position:absolute;left:0;top:0;bottom:0;width:38px;background:var(--surface);border-right:1px solid var(--border);padding:16px 6px 16px 0;font-family:var(--mono);font-size:12px;line-height:1.75;color:var(--dim);text-align:right;pointer-events:none;overflow:hidden;white-space:pre;user-select:none}

/* Output pane */
.output-pane{flex-shrink:0;height:220px;border-top:2px solid var(--border2);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.output-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.output-title{font-size:11px;font-weight:600;display:flex;align-items:center;gap:7px;font-family:var(--mono)}
.output-status{width:7px;height:7px;border-radius:50%;background:var(--dim)}
.output-status.running{background:var(--blue);animation:pulse 1s infinite}
.output-status.correct{background:var(--green);box-shadow:0 0 6px var(--green)}
.output-status.partial{background:var(--amber)}
.output-status.error{background:var(--red)}
.output-body{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.loading-bar{height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);background-size:200% 100%;animation:shimmer 1s infinite;flex-shrink:0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Output content */
table.rt{border-collapse:collapse;font-size:11px;font-family:var(--mono);min-width:100%}
table.rt th{background:var(--surface3);color:var(--blue);padding:4px 9px;border:1px solid var(--border);white-space:nowrap;font-size:10px}
table.rt td{padding:3px 9px;border:1px solid var(--border);color:var(--text);white-space:nowrap}
table.rt tr:nth-child(even) td{background:var(--surface2)}
.rt-note{font-size:10px;color:var(--muted);margin-top:4px}
.error-box{background:var(--red-bg);border:1px solid var(--red);border-radius:5px;padding:8px 11px;font-family:var(--mono);font-size:11px;color:var(--red)}
.out-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;color:var(--muted)}
.out-label.correct{color:var(--green)}
.out-label.model{color:var(--purple)}
.out-section{margin-bottom:12px}
.model-code{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;font-family:var(--mono);font-size:11px;color:var(--text);white-space:pre-wrap;line-height:1.65}
.empty-output{color:var(--dim);font-size:12px;font-family:var(--mono);padding:8px 0}

/* Bottom bar */
.bottom-bar{background:var(--surface);border-top:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.bottom-left{display:flex;gap:6px;align-items:center}
.bottom-right{display:flex;gap:6px}

/* Skeletons */
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px}
.sl{height:12px;margin-bottom:8px}
.empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.7}
.empty-icon{font-size:22px;margin-bottom:8px;opacity:.4}

/* Diff info button + popover */
.diff-info-btn{width:18px;height:18px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;line-height:1;transition:all .15s;flex-shrink:0}
.diff-info-btn:hover{border-color:var(--blue);color:var(--blue)}
.diff-popover{display:none;position:absolute;top:52px;left:50%;transform:translateX(-50%);z-index:100;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:14px 16px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.diff-popover.open{display:block}
.diff-pop-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* Feedback pane */
.feedback-pane{border-top:2px solid var(--border2);background:var(--surface2);flex-shrink:0;max-height:220px;display:flex;flex-direction:column;overflow:hidden}
.feedback-pane-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.feedback-pane-body{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

/* Resize handle */
.resize-handle{height:5px;background:var(--border);cursor:ns-resize;flex-shrink:0;transition:background .15s;position:relative;z-index:5}
.resize-handle:hover,.resize-handle.dragging{background:var(--blue)}
.resize-handle::after{content:'';display:block;width:30px;height:3px;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);margin:1px auto 0}

.learn-concept{background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:12px;margin-bottom:10px}
.learn-concept-title{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:6px;letter-spacing:.04em}
.learn-concept-body{font-size:12px;color:#b0bdd0;line-height:1.7}
.learn-sql{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;font-family:var(--mono);font-size:11px;color:var(--text);white-space:pre-wrap;line-height:1.65;margin-top:6px}

/* Verdict pills */
.out-verdict-pill{font-size:10px;font-family:var(--mono);font-weight:600;padding:2px 9px;border-radius:10px;border:1px solid;margin-left:8px}
.vp-correct{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.vp-close{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.vp-incorrect{background:var(--red-bg);color:var(--red);border-color:var(--red)}
#out-hints-area{border-top:1px solid var(--border);padding:8px 12px;flex-shrink:0;background:var(--surface)}
.out-hint-row{font-size:11.5px;color:var(--muted);padding:3px 0;line-height:1.5;display:flex;gap:7px;align-items:baseline}
.out-hint-row::before{content:"→";color:var(--amber);flex-shrink:0;font-size:10px}
.run-btn-incorrect{background:transparent;border-color:var(--red);color:var(--red)}
.run-btn-close{background:transparent;border-color:var(--amber);color:var(--amber)}

/* Popover buttons */
.hdr-popover-btn{font-family:var(--sans);font-size:11px;font-weight:500;padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.hdr-popover-btn:hover:not(:disabled){border-color:var(--purple);color:var(--purple);background:var(--purple-bg)}
.hdr-popover-btn:disabled{opacity:.4;cursor:not-allowed}
.hdr-popover-btn.active{border-color:var(--purple);color:var(--purple);background:var(--purple-bg)}
.hdr-popover{scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

/* Vertical resize handle */
.vert-resize-handle{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative;z-index:5}
.vert-resize-handle:hover,.vert-resize-handle.v-dragging{background:var(--blue)}
.vert-resize-handle::after{content:'';display:block;width:3px;height:24px;border-left:1px solid var(--border2);border-right:1px solid var(--border2);position:absolute;top:50%;left:1px;transform:translateY(-50%)}

/* Explain area */
.explain-section{border-top:1px solid var(--border);padding:10px 12px;background:var(--surface2)}
.explain-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:8px}
.explain-line{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(35,45,69,.4);align-items:flex-start}
.explain-line:last-child{border-bottom:none}
.explain-sql{font-family:var(--mono);font-size:10.5px;color:var(--blue);min-width:180px;flex-shrink:0;line-height:1.5;padding-top:1px}
.explain-desc{font-size:11.5px;color:#b0bdd0;line-height:1.6}
.explain-loading{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">SQL<span>.learn</span></div>
  <div class="sep"></div>
  <select class="dialect-select" id="dialect-select" onchange="setDialect(this.value)">
    <option value="tsql">T-SQL (SQL Server)</option>
    <option value="mysql">MySQL</option>
    <option value="postgres">PostgreSQL</option>
    <option value="sqlite">SQLite</option>
    <option value="spark">Spark SQL</option>
    <option value="oracle">Oracle SQL</option>
    <option value="bigquery">BigQuery</option>
  </select>
  <div class="sep"></div>
  <div style="position:relative;display:flex;align-items:center;gap:5px">
    <button class="diff-info-btn" onclick="toggleSqlDiff(event)" title="SQL dialect differences" style="border-radius:5px;width:auto;padding:3px 8px;font-size:11px;font-weight:500;font-family:var(--sans)">SQL Diff</button>
    <div class="diff-popover" id="sql-diff-popover" style="top:34px;left:0;transform:none;width:560px;max-height:420px;overflow-y:auto"></div>
  </div>
  <div class="sep"></div>
  <div class="cat-selector" id="cat-selector">
    <span class="cat-label">Topic:</span>
    <select class="cat-dropdown" id="cat-dropdown" onchange="selectCategory(this.value)">
      <option value="">Select a topic...</option>
    </select>
    <div style="position:relative">
      <button class="hdr-popover-btn" id="guide-btn" onclick="toggleGuidePopover(event)" disabled>Guide</button>
      <div class="diff-popover hdr-popover" id="guide-popover" style="top:36px;left:0;transform:none;width:460px;max-height:500px;overflow-y:auto;padding:0"></div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-blue" id="new-q-btn" onclick="newQuestion()" disabled>Next question</button>
  </div>
</div>

<div class="main">
  <!-- LEFT -->
  <div class="left" id="left-panel">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('problem')">Question</div>
      <div class="tab" onclick="switchTab('data')">Data</div>
    </div>
    <div class="panel active" id="tab-problem">
      <div class="empty"><div class="empty-icon">&#128218;</div><div>Select a topic above to begin learning.</div><div style="font-size:11px;color:var(--dim);margin-top:8px">Basic draws from basic topics. Intermediate adds joins and grouping. Advanced includes CTEs and window functions.</div></div>
    </div>
    <div class="panel" id="tab-data">
      <!-- Rendered by renderDataTab() on page load -->
    </div>
  </div>

  <!-- VERTICAL RESIZE -->
  <div class="vert-resize-handle" id="vert-resize-handle"></div>

  <!-- RIGHT -->
  <div class="right">
    <div class="editor-hdr">
      <div class="lang-tag"><div class="lang-dot"></div><span id="dialect-label">T-SQL</span></div>
      <div class="editor-btns">
        <button class="btn btn-ghost" onclick="clearEditor()">Clear</button>
        <button class="btn btn-ghost" id="showme-btn" onclick="showMeAnswer()" disabled>Show me</button>
        <button class="btn btn-ghost" id="explain-btn" onclick="explainQuery()" disabled style="display:none">Explain &#10140;</button>
        <button class="btn btn-teal"  id="run-btn"    onclick="runQuery()"     disabled>Run &#9654;</button>

// ─── Concept Knowledge Base ────────────────────────────────────────────────────
const CONCEPT_KNOWLEDGE = {
  select:{title:'SELECT & WHERE',explanation:'SELECT chooses which columns to return. WHERE filters which rows are included. WHERE runs before SELECT, so you cannot use a column alias defined in SELECT inside WHERE.',syntax:'SELECT col1, col2, expression AS alias\nFROM   TableName\nWHERE  condition AND/OR condition',tip:'AND binds tighter than OR — use parentheses when mixing them to be explicit.'},
  joins:{title:'JOINs',explanation:'JOINs combine rows from two or more tables. INNER JOIN returns only matched rows. LEFT JOIN returns all rows from the left table, with NULLs for unmatched right rows. A LEFT JOIN that filters WHERE right.col IS NULL becomes an anti-join.',syntax:'SELECT a.col, b.col\nFROM   TableA a\nINNER JOIN TableB b ON a.id = b.id\n\n-- Anti-join:\nFROM TableA a\nLEFT  JOIN TableB b ON a.id = b.id\nWHERE b.id IS NULL',tip:'Always alias your tables when joining — it prevents ambiguity and keeps queries readable.'},
  groupby:{title:'GROUP BY & HAVING',explanation:'GROUP BY collapses rows into groups so you can aggregate them. Every non-aggregate column in SELECT must appear in GROUP BY. HAVING filters after grouping — use it when you need to filter on an aggregate result.',syntax:'SELECT   col, COUNT(*), SUM(amount)\nFROM     TableName\nWHERE    condition\nGROUP BY col\nHAVING   COUNT(*) > 5',tip:'WHERE cannot reference aggregates — that is what HAVING is for. Remember: WHERE before grouping, HAVING after.'},
  subquery:{title:'Subqueries',explanation:'A subquery is a SELECT nested inside another query. In WHERE it filters rows. In FROM it acts as a derived table. EXISTS is faster than IN when checking existence because it stops at the first match.',syntax:'WHERE col IN (SELECT col FROM t WHERE ...)\nWHERE EXISTS (SELECT 1 FROM t WHERE t.id = outer.id)\nFROM (SELECT col, COUNT(*) AS cnt FROM t GROUP BY col) sub\nWHERE sub.cnt > 5',tip:'Use EXISTS when you only care whether a match exists — it short-circuits as soon as one row is found.'},
  case:{title:'CASE & Conditional Logic',explanation:'CASE is SQL\'s if/else — it returns a value based on conditions. COALESCE returns the first non-NULL from a list. NULLIF returns NULL when two values are equal.',syntax:'CASE\n  WHEN salary < 60000 THEN \'Junior\'\n  WHEN salary < 90000 THEN \'Mid\'\n  ELSE \'Senior\'\nEND AS band\n\nCOALESCE(colA, colB, \'default\')\nNULLIF(col, 0)',tip:'Always include ELSE in CASE — without it, unmatched rows silently return NULL and can corrupt aggregations.'},
  cte:{title:'Common Table Expressions (CTEs)',explanation:'A CTE (WITH clause) gives a name to a subquery so you can reference it like a table. It lives only for the duration of the query. CTEs are the solution when you need to filter on a window function result — calculate in the CTE, filter outside.',syntax:'WITH Step1 AS (\n  SELECT col, COUNT(*) AS cnt\n  FROM   TableName\n  GROUP BY col\n),\nStep2 AS (\n  SELECT *, RANK() OVER (ORDER BY cnt DESC) AS rnk\n  FROM   Step1\n)\nSELECT * FROM Step2 WHERE rnk <= 3',tip:'You cannot use a window function result in WHERE in the same query. Wrap it in a CTE, then filter in the outer SELECT.'},
  window:{title:'Window Functions',explanation:'Window functions calculate across a set of rows related to the current row without collapsing them. OVER() defines the window. PARTITION BY divides rows into groups. ROW_NUMBER always gives unique numbers; DENSE_RANK handles ties without gaps.',syntax:'fn() OVER (\n  PARTITION BY group_col\n  ORDER BY   order_col\n)\n\nROW_NUMBER()  -- 1,2,3 unique\nRANK()        -- 1,1,3 gaps after ties\nDENSE_RANK()  -- 1,1,2 no gaps',tip:'For "Nth highest" problems always use DENSE_RANK — RANK skips numbers after ties which produces incorrect results.'},
  lag_lead:{title:'LAG & LEAD',explanation:'LAG looks back N rows in the ordered window. LEAD looks forward N rows. Both return NULL at the edges. The third argument is a default value. These are essential for period-over-period comparisons.',syntax:'LAG (col, 1, default) OVER (PARTITION BY id ORDER BY date)\nLEAD(col, 1, default) OVER (PARTITION BY id ORDER BY date)\n\ncol - LAG(col) OVER (PARTITION BY id ORDER BY date) AS change',tip:'The third argument to LAG/LEAD sets the default when there is no prior/next row — use 0 for numeric comparisons so the first row does not produce NULL.'},
  running:{title:'Running Totals & Rolling Averages',explanation:'Aggregate window functions apply SUM, AVG etc. over a frame of rows without collapsing them. The frame clause (ROWS BETWEEN) defines which rows each calculation sees. UNBOUNDED PRECEDING means from the very first row.',syntax:'SUM(col) OVER (\n  PARTITION BY dept\n  ORDER BY   date\n  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n)\n\nAVG(col) OVER (\n  ORDER BY date\n  ROWS BETWEEN 2 PRECEDING AND CURRENT ROW\n)',tip:'ROWS counts physical rows. RANGE uses the ORDER BY value — useful for date-based windows where multiple rows share the same date.'},
  dates:{title:'Date Functions',explanation:'Date functions let you extract parts of dates, calculate differences, and add or subtract time. DATEDIFF and DATEADD are the workhorses. Avoid wrapping indexed date columns in functions in WHERE — use range conditions instead.',syntax:'GETDATE()                           -- current datetime\nCAST(GETDATE() AS DATE)            -- date only\nDATEDIFF(day, start_col, end_col)\nDATEADD(month, -3, GETDATE())\nYEAR(col)  MONTH(col)  DAY(col)\nEOMONTH(col)',tip:'Do not use YEAR(col) = 2024 in WHERE — it prevents index seeks. Use: col BETWEEN \'2024-01-01\' AND \'2024-12-31\' instead.'},
  strings:{title:'String Functions',explanation:'String functions manipulate and extract text. CONCAT handles NULLs better than + because it treats NULL as empty string. CHARINDEX finds a substring position. SUBSTRING extracts a portion.',syntax:'LEN(col)\nLEFT(col, 3)    RIGHT(col, 4)\nSUBSTRING(col, start, length)\nUPPER(col)     LOWER(col)     TRIM(col)\nCONCAT(first, \' \', last)\nREPLACE(col, \'old\', \'new\')\nCHARINDEX(\'@\', email)',tip:'CONCAT(a, b) is safer than a + b — if either operand is NULL, + returns NULL but CONCAT treats it as empty string.'},
  having:{title:'Aggregation & Filters (HAVING)',explanation:'Aggregation functions — COUNT, SUM, AVG, MIN, MAX — collapse multiple rows into a single value per group. HAVING is the filter that runs after grouping. The key rule: WHERE filters rows before grouping, HAVING filters groups after.',syntax:'SELECT   dept, COUNT(*) AS total, AVG(salary) AS avg_sal\nFROM     employees\nWHERE    hire_date > \'2020-01-01\'\nGROUP BY dept\nHAVING   COUNT(*) > 2\n         AND AVG(salary) > 60000\nORDER BY total DESC',tip:'HAVING cannot be used without GROUP BY. If you need to filter on an aggregate, use HAVING. If on a raw column, use WHERE.'},
  setops:{title:'UNION & Set Operations',explanation:'Set operations combine the results of two SELECT statements vertically. UNION removes duplicates (slower). UNION ALL keeps all rows (faster — prefer this). INTERSECT returns rows in both sets. EXCEPT returns rows in the first set but not the second.',syntax:'SELECT id, name FROM TableA\nUNION ALL\nSELECT id, name FROM TableB\n\nSELECT id FROM A\nEXCEPT\nSELECT id FROM B',tip:'Always use UNION ALL unless you specifically need deduplication. UNION sorts every row to remove duplicates — it is significantly slower.'},
  sorting:{title:'ORDER BY, TOP & Pagination',explanation:'ORDER BY sorts the result set and is always the last clause evaluated. ASC is the default. TOP n (T-SQL) or LIMIT n returns only the first n rows — always pair with ORDER BY or results are arbitrary.',syntax:'SELECT TOP 10 *\nFROM   employees\nORDER BY salary DESC, last_name ASC\n\n-- Pagination:\nORDER BY salary DESC\nOFFSET 10 ROWS\nFETCH NEXT 10 ROWS ONLY',tip:'TOP without ORDER BY returns an arbitrary set of rows — always pair them.'},
  nulls:{title:'NULL Handling',explanation:'NULL means unknown or missing. Any arithmetic or comparison with NULL returns NULL. The only correct way to check for NULL is IS NULL or IS NOT NULL. COALESCE returns the first non-NULL value from a list.',syntax:'WHERE col IS NULL\nWHERE col IS NOT NULL\n\nCOALESCE(col_a, col_b, \'default\')\nISNULL(col, 0)               -- SQL Server\n\nvalue / NULLIF(denominator, 0)',tip:'Never use = NULL in a WHERE clause — it always evaluates to false. Use IS NULL instead.'},
  typeconv:{title:'Type Conversion',explanation:'CAST converts a value to a different type and throws an error on failure. TRY_CAST returns NULL instead of erroring. Integer division truncates silently — 5/2 = 2 in SQL.',syntax:'CAST(col AS INT)           -- error on failure\nCAST(col AS FLOAT)         -- for decimal division\nTRY_CAST(col AS INT)       -- NULL on failure (safe)\n\nSELECT 5 / 2               -- returns 2\nSELECT CAST(5 AS FLOAT)/2  -- returns 2.5',tip:'Integer division truncates silently — cast at least one operand to FLOAT before dividing if you need decimal results.'},
};

// ─── Schema helpers for prompts ────────────────────────────────────────────────
function buildSchemaDesc() {
  return FIXED_DATASET.tables.map(t =>
    t.name + '(' + t.columns.map(c => c.name + ':' + c.type).join(',') + ')'
  ).join(' | ');
}

function buildRowData() {
  return FIXED_DATASET.tables.map(t => {
    const cols = t.columns.map(c => c.name);
    const rows = t.rows.map(r => cols.map(c => r[c] !== null && r[c] !== undefined ? r[c] : 'NULL').join('|'));
    return t.name + '[' + cols.join('|') + ']\n' + rows.join('\n');
  }).join('\n\n');
}

function renderCategoryPills() {

function selectCategory(tier) {
  if (!tier || isGenerating || isRunning) return;
  currentCategory = tier;
  currentTopicKey = null;
  document.getElementById('guide-btn').disabled = false;
  document.getElementById('new-q-btn').disabled = false;
  newQuestion();
}

function newQuestion() {
  if (isGenerating || isRunning || !currentCategory) return;
  isGenerating = true;
  document.getElementById('new-q-btn').disabled = true;
  document.getElementById('new-q-btn').textContent = 'Loading...';
  generateLearnQuestion().finally(() => {
    isGenerating = false;
    document.getElementById('new-q-btn').disabled = false;
    document.getElementById('new-q-btn').textContent = 'Next question';
  });
}

// ─── Question Generation ───────────────────────────────────────────────────────
async function generateLearnQuestion() {
  if (!currentCategory) return;
  const pool = TIER_POOLS[currentCategory] || TIER_POOLS.basic;
  const cat  = pool[Math.floor(Math.random() * pool.length)];
  currentTopicKey = cat.key;

  qNum++;
  hints      = [];
  hintShown  = 0;
  question   = null;
  updateHintBtn();
  showProblemSkeleton();
  clearEditor(true);
  setOutputEmpty();
  closeFeedbackPane();
  hideNextBtn();
  document.getElementById('run-btn').disabled = true;
  document.getElementById('showme-btn').disabled = true;

  try {
    const rule       = topicRules[cat.key] || 'Use ' + cat.label + ' correctly.';
    const rowData    = buildRowData();

    const qPrompt =
      'Generate a SQL practice question for the topic: ' + cat.label + ' (' + (currentCategory === 'basic' ? 'Basic' : currentCategory === 'intermediate' ? 'Intermediate' : 'Advanced') + ' level).\n\n' +
      'Available tables and full data:\n' + rowData + '\n\n' +
      'Topic constraint — the correct SQL answer MUST follow this rule exactly:\n' + rule + '\n\n' +
      'JSON only — no markdown, no preamble:\n' +
      '{"title":"Short descriptive question title (no company or person names)",' +
      '"description":"2-3 sentences. Describe a data task using these tables. What to query and what to return. Reference real column and table names. Do NOT invent company names, person names, or fictional organisations.",' +
      '"what_to_use":"One sentence stating the exact SQL clause or function the learner must use",' +
      '"model_answer":"the complete correct SQL query using actual table/column names formatted with each major clause on its own line",' +
      '"example_output":"execute model_answer mentally against the full data above and list EVERY row it returns — real values only. Format: |col|col|\\n|---|---|\\n|v|v|",' +
      '"constraints":["specific requirement referencing real column names"],' +
      '"hints":["concept reminder — what clause/function to reach for","more specific structural hint about this query","near-answer hint with a key keyword"],' +
      '"teaching_note":"1 sentence: what specifically this question trains about ' + cat.label + '"}\n' +
      'Important: use real column and table names only. example_output MUST contain real values from the data rows above. No fictional names.';

    question = await callClaude(qPrompt, 1200);
    if (question && question.model_answer) {
      question.model_answer_cache = formatSQL(question.model_answer);
    }
    hints     = question.hints || [];
    hintShown = 0;
    updateHintBtn();
    renderProblem();
    document.getElementById('run-btn').disabled = false;
    document.getElementById('showme-btn').disabled = false;
    document.getElementById('run-btn').className   = 'btn btn-teal';
    document.getElementById('run-btn').textContent  = 'Run \u25B6';
    showConceptGuide();

  } catch(e) {
    document.getElementById('tab-problem').innerHTML =
      '<div class="empty"><div>Failed: ' + esc(e.message) + '</div>' +
      '<button class="btn btn-ghost" style="margin-top:10px" onclick="newQuestion()">Retry</button></div>';
  }
}

// ─── Data Tab Rendering ────────────────────────────────────────────────────────
function renderDataTab() {
  const el = document.getElementById('tab-data');
  if (!el) return;

  const totalRows = FIXED_DATASET.tables.reduce((s, t) => s + t.rows.length, 0);
  let html = '<div class="data-tab-header">' +
    '<div class="data-tab-db-name">Practice Database</div>' +
    '<div class="data-tab-desc">Three related tables covering employees, products, and sales transactions. All questions are written against this dataset.</div>' +
    '<div class="data-tab-stats">' +
    '<div class="data-stat"><span>' + FIXED_DATASET.tables.length + '</span> tables</div>' +
    '<div class="data-stat"><span>' + totalRows + '</span> total rows</div>' +
    FIXED_DATASET.tables.map(t =>
      '<div class="data-stat">' + esc(t.name) + ' <span>' + t.rows.length + 'r</span></div>'
    ).join('') +
    '</div></div>';

  FIXED_DATASET.tables.forEach(t => {
    const pkCols = t.columns.filter(c => c.note === 'PK').map(c => c.name);
    const fkCols = t.columns.filter(c => c.note && c.note.startsWith('FK')).map(c => c.name);
    const cols   = t.columns.map(c => c.name);

    html += '<div class="data-tbl-section">';
    html += '<div class="data-tbl-header">' +
      '<span class="data-tbl-name">' + esc(t.name) + '</span>' +
      '<span class="data-tbl-badge">' + t.rows.length + ' rows</span>' +
      '</div>';
    html += '<div class="data-tbl-desc">' + esc(t.description) + '</div>';

    // Column schema pills
    html += '<div class="data-col-schema">';
    t.columns.forEach(c => {
      const cls = c.note === 'PK' ? 'pk' : (c.note && c.note.startsWith('FK') ? 'fk' : '');
      html += '<span class="data-col-pill ' + cls + '" title="' + esc(c.note) + '">' +
        esc(c.name) + ' <span style="opacity:.6">' + esc(c.type) + '</span>' +
        (c.note === 'PK' ? ' 🔑' : c.note && c.note.startsWith('FK') ? ' ⇒' : '') +
        '</span>';
    });
    html += '</div>';

    // Full data table
    html += '<div class="data-scroll-wrap"><table class="dt"><thead><tr>';
    cols.forEach(c => { html += '<th>' + esc(c) + '</th>'; });
    html += '</tr></thead><tbody>';
    t.rows.forEach(row => {
      html += '<tr>';
      cols.forEach(c => {
        const v = row[c];
        const isPK = pkCols.includes(c);
        const isFK = fkCols.includes(c);
        const cls  = isPK ? 'pk-cell' : isFK ? 'fk-cell' : '';
        const isNull = v === null || v === undefined;
        html += '<td class="' + cls + (isNull ? ' null-cell' : '') + '">' +
          (isNull ? 'NULL' : esc(String(v))) + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
  });

  el.innerHTML = html;
}

// ─── Run Query ─────────────────────────────────────────────────────────────────
async function runQuery() {
  if (!question || isRunning || isGenerating) return;
  const sql = document.getElementById('editor').value.trim();
  if (!sql) { setOutputMsg('Write a query first.'); return; }

  isRunning = true;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('run-btn').textContent = 'Running...';
  document.getElementById('out-status').className = 'output-status running';
  document.getElementById('out-title').textContent = 'Running...';
  document.getElementById('out-body').innerHTML = '';
  document.getElementById('out-rowcount').textContent = '';
  document.getElementById('loading-bar-wrap').style.display = 'block';

  const schemaLine = buildSchemaDesc();
  const rowData    = buildRowData();
  const taskDesc   = question.description || '';
  const expectedOut = question.example_output ? 'Expected output:\n' + question.example_output + '\n' : '';

  const prompt =
    'Simulate SQL execution. Dialect: ' + DIALECTS[dialect] + '\n' +
    'Schema: ' + schemaLine + '\nFull data:\n' + rowData + '\n' +
    'Task: ' + taskDesc + '\n' + expectedOut +
    'Query to simulate:\n' + sql + '\n\n' +
    'JSON: {"verdict":"correct|partial|incorrect|error","is_acceptable":true,' +
    '"error_message":null,"cols":["col_name"],"rows":[[val]],"row_note":null,' +
    '"model_answer":"clean SQL"}\n' +
    'CRITICAL: Execute the query mentally against the actual data rows above. ' +
    'cols and rows MUST reflect what this query actually returns — never empty unless it genuinely matches zero rows. ' +
    'is_acceptable=true ONLY if the query correctly answers the task AND its output matches the expected output (same rows, same values). ' +
    'verdict=partial if close but wrong column, filter, or sort. ' +
    'model_answer uses ' + DIALECTS[dialect] + ' syntax with real col/table names.';

  try {
    const result = await callClaude(prompt, 2400);
    if (result.model_answer && question) question.model_answer_cache = result.model_answer;
    lastCorrect = !!result.is_acceptable;
    if (lastCorrect) showNextBtn();
    renderResult(result);
  } catch(e) {
    document.getElementById('out-status').className = 'output-status error';
    document.getElementById('out-title').textContent = 'Error';
    document.getElementById('out-body').innerHTML = '<div class="error-box">' + esc(e.message) + '</div>';
  }

  isRunning = false;
  document.getElementById('loading-bar-wrap').style.display = 'none';
  document.getElementById('run-btn').disabled = false;
}

// ─── Render Result ─────────────────────────────────────────────────────────────
function renderResult(r) {
  const isError   = r.verdict === 'error';
  const isCorrect = r.is_acceptable;
  const isClose   = !isCorrect && !isError && r.verdict === 'partial';

  const runBtn = document.getElementById('run-btn');
  if (isCorrect)      { runBtn.className = 'btn btn-green';          runBtn.textContent = '✓ Correct'; }
  else if (isClose)   { runBtn.className = 'btn run-btn-close';      runBtn.textContent = 'Run ▶'; }
  else if (isError)   { runBtn.className = 'btn btn-ghost';          runBtn.textContent = 'Run ▶'; }
  else                { runBtn.className = 'btn run-btn-incorrect';   runBtn.textContent = 'Run ▶'; }

  const pillEl = document.getElementById('out-verdict-pill');
  if (isCorrect)      { pillEl.style.display='inline'; pillEl.className='out-verdict-pill vp-correct';   pillEl.textContent='Accepted'; }
  else if (isClose)   { pillEl.style.display='inline'; pillEl.className='out-verdict-pill vp-close';     pillEl.textContent='Getting closer'; }
  else if (!isError)  { pillEl.style.display='inline'; pillEl.className='out-verdict-pill vp-incorrect'; pillEl.textContent='Not quite'; }
  else                { pillEl.style.display='none'; }

  document.getElementById('out-status').className = 'output-status ' +
    (isError ? 'error' : isCorrect ? 'correct' : isClose ? 'partial' : 'error');
  document.getElementById('out-title').textContent = isError ? 'Error' : 'Output';
  document.getElementById('out-rowcount').textContent = '';

  let outHtml = '';
  if (r.error_message) outHtml += '<div class="error-box">' + esc(r.error_message) + '</div>';

  const cols = r.cols || r.simulated_columns;
  const rows = r.rows || r.simulated_rows;
  if (cols && cols.length && rows && rows.length) {
    outHtml += '<div class="result-table-wrap"><table class="rt"><thead><tr>';
    cols.forEach(c => { outHtml += '<th>' + esc(String(c)) + '</th>'; });
    outHtml += '</tr></thead><tbody>';
    rows.forEach(row => {
      outHtml += '<tr>';
      (Array.isArray(row) ? row : Object.values(row)).forEach(v => {
        outHtml += '<td>' + (v===null||v===undefined ? '<span style="color:var(--dim)">NULL</span>' : esc(String(v))) + '</td>';
      });
      outHtml += '</tr>';
    });
    outHtml += '</tbody></table></div>';
    if (r.row_note) outHtml += '<div class="rt-note">' + esc(r.row_note) + '</div>';
    document.getElementById('out-rowcount').textContent = rows.length + ' row' + (rows.length !== 1 ? 's' : '');
  } else if (!r.error_message) {
    outHtml += '<div class="empty-output">Query returned no rows.</div>';
  }

  if (isCorrect && r.model_answer) {
    if (question) question.model_answer_cache = r.model_answer;
    outHtml += buildModelAnswerHtml(r.model_answer);
  }
  document.getElementById('out-body').innerHTML = outHtml;

  const explainBtn = document.getElementById('explain-btn');
  if (explainBtn && document.getElementById('editor').value.trim()) {
    explainBtn.style.display = 'inline-flex';
    explainBtn.disabled = false;
  }

  const hintsArea = document.getElementById('out-hints-area');
  if (!isCorrect && !isError && hints.length > 0) {
    hintsArea.style.display = 'block';
    const show = Math.min(hintShown, hints.length);
    let hHtml = '';
    for (let i = 0; i < show; i++) hHtml += '<div class="out-hint-row">' + esc(hints[i]) + '</div>';
    if (hintShown < hints.length)
      hHtml += '<div style="margin-top:4px"><button class="btn btn-ghost" style="font-size:11px;padding:3px 10px" onclick="showNextHint()">Next hint (' + (hints.length - hintShown) + ' remaining)</button></div>';
    hintsArea.innerHTML = hHtml;
  } else {
    hintsArea.style.display = 'none';
  }
}

function showNextHint() {
  hintShown++;
  updateHintBtn();
  const hintsArea = document.getElementById('out-hints-area');
  if (!hintsArea) return;
  const show = Math.min(hintShown, hints.length);
  let hHtml = '';
  for (let i = 0; i < show; i++) hHtml += '<div class="out-hint-row">' + esc(hints[i]) + '</div>';
  if (hintShown < hints.length)
    hHtml += '<div style="margin-top:4px"><button class="btn btn-ghost" style="font-size:11px;padding:3px 10px" onclick="showNextHint()">Next hint (' + (hints.length - hintShown) + ' remaining)</button></div>';
  hintsArea.innerHTML = hHtml;
}

      esc(tierLabels[currentCategory] || '') + ' — ' + esc(topicEntry.label) + ' ' + esc(topicEntry.icon) + '</span>'

    '</div>';
}

function renderMarkdownTable(text) {
  if (!text) return '';
  if (!text.includes('|')) return '<pre style="font-family:var(--mono);font-size:11px;white-space:pre-wrap">' + esc(text) + '</pre>';
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return '<pre style="font-family:var(--mono);font-size:11px;white-space:pre-wrap">' + esc(text) + '</pre>';
  let html = '<div class="result-table-wrap"><table class="rt"><thead><tr>';
  const headers = lines[0].split('|').map(h => h.trim()).filter(h => h);
  headers.forEach(h => { html += '<th>' + esc(h) + '</th>'; });
  html += '</tr></thead><tbody>';
  lines.slice(2).forEach(line => {
    if (!line.trim() || line.trim().replace(/[|\-\s]/g,'') === '') return;
    const cells = line.split('|').map(c => c.trim()).filter((c, i, arr) =>
      !(i === 0 && c === '') && !(i === arr.length-1 && c === '')
    );
    html += '<tr>';
    cells.forEach(cell => { html += '<td>' + esc(cell) + '</td>'; });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// ─── Concept Guide Popover ─────────────────────────────────────────────────────
function showConceptGuide() {
  const btn = document.getElementById('guide-btn');
  if (btn) btn.disabled = false;
  renderGuidePopoverContent();
}

function toggleGuidePopover(e) {
  e.stopPropagation();
  const pop = document.getElementById('guide-popover');
  pop.classList.toggle('open');
  if (pop.classList.contains('open')) {
    renderGuidePopoverContent();
    document.addEventListener('click', function closeGuide() {
      pop.classList.remove('open');
      document.getElementById('guide-btn').classList.remove('active');
      document.removeEventListener('click', closeGuide);
    });
    document.getElementById('guide-btn').classList.add('active');
  } else {
    document.getElementById('guide-btn').classList.remove('active');
  }
}

function renderGuidePopoverContent() {

function showMeAnswer() {
  if (!question) return;
  if (question.model_answer_cache) {
    document.getElementById('editor').value = question.model_answer_cache;
    updateLineNumbers();
    const eb = document.getElementById('explain-btn');
    if (eb) { eb.style.display = 'inline-flex'; eb.disabled = false; }
    return;
  }
  const btn = document.getElementById('showme-btn');
  btn.disabled = true; btn.textContent = 'Loading...';
  const schemaLine = buildSchemaDesc();
  const msgContent =
    'Write a ' + DIALECTS[dialect] + ' SQL query for: ' + (question.description || '') +
    ' Schema: ' + schemaLine +
    '. Format the SQL with each major clause (SELECT, FROM, JOIN, WHERE, GROUP BY, HAVING, ORDER BY) on its own line. Indent continuation lines with 2 spaces. No markdown, no explanation.';
  fetch(API, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: MODEL, max_tokens: 400, messages: [{ role: 'user', content: msgContent }] }),
  }).then(r => r.json()).then(d => {
    const sql = (d.content && d.content[0] && d.content[0].text) ? d.content[0].text.trim() : '';
    const clean = sql.replace(/^```(?:sql)?\s*/i,'').replace(/\s*```\s*$/i,'').trim();

    btn.disabled = false; btn.textContent = 'Show me';
    const eb = document.getElementById('explain-btn');
    if (eb) { eb.style.display = 'inline-flex'; eb.disabled = false; }
  }).catch(() => { btn.disabled = false; btn.textContent = 'Show me'; });
}

async function explainQuery() {
  const sql = document.getElementById('editor').value.trim();
  if (!sql) return;
  const btn = document.getElementById('explain-btn');
  btn.disabled = true; btn.textContent = 'Explaining...';
  const explainArea = document.getElementById('out-explain-area');
  explainArea.style.display = 'block';
  explainArea.innerHTML = '<div class="explain-section"><div class="explain-loading"><div class="lang-dot" style="animation:pulse 1s infinite"></div>Generating explanation...</div></div>';
  const schemaLine = buildSchemaDesc();
  const prompt =
    'Explain this SQL query line by line for a learner. Topic: ' + (currentTopicKey || '') + '.' +
    ' Schema: ' + schemaLine + '.' +
    ' Query: ' + sql.replace(/\n/g,' ') + '.' +
    ' Respond ONLY with JSON array: [{"sql":"clause","explanation":"plain English why"}]' +
    ' Rules: split by clause. 1-2 sentences each. Explain WHY not just what.';
  try {
    const lines = await callClaude(prompt, 1200);
    if (!Array.isArray(lines) || !lines.length) throw new Error('No explanation returned');
    let html = '<div class="explain-section"><div class="explain-label">&#10140; Query explained</div>';
    lines.forEach(line => {
      html += '<div class="explain-line"><div class="explain-sql">' + esc(line.sql || '') + '</div><div class="explain-desc">' + esc(line.explanation || '') + '</div></div>';
    });
    html += '</div>';
    explainArea.innerHTML = html;
    btn.textContent = 'Explain →'; btn.disabled = false;
  } catch(e) {
    explainArea.innerHTML = '<div class="explain-section"><div style="color:var(--muted);font-size:12px">Could not generate explanation. ' + esc(e.message) + '</div></div>';
    btn.textContent = 'Explain →'; btn.disabled = false;
  }
}

// ─── Utilities ─────────────────────────────────────────────────────────────────
function formatSQL(sql) {
  if (!sql) return sql;
  if (sql.includes('\n')) return sql;
  const keywords = ['SELECT','FROM','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL OUTER JOIN','CROSS JOIN','JOIN','WHERE','AND','OR','GROUP BY','HAVING','ORDER BY','LIMIT','OFFSET','UNION ALL','UNION','INTERSECT','EXCEPT','WITH','ON','SET'];
  let result = sql.trim();
  keywords.forEach(kw => {
    result = result.replace(new RegExp('\\b' + kw + '\\b', 'gi'), '\n' + kw);
  });
  return result.split('\n').filter(l => l.trim()).map((line, i) => {
    const t = line.trim();
    if (i === 0) return t;
    if (/^(AND|OR)\b/i.test(t)) return '  ' + t;
    return t;
  }).join('\n');
}

function esc(s) {

  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Claude API ────────────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens) {
  const r = await fetch(API, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: MODEL, max_tokens: maxTokens || 900,
      messages: [{ role: 'user', content: prompt }] }),
  });
  if (!r.ok) throw new Error('API ' + r.status);
  const d = await r.json();
  if (d.stop_reason === 'max_tokens') throw new Error('Response truncated - try again.');
  const raw  = (d.content && d.content[0] && d.content[0].text) ? d.content[0].text : '';
  const text = raw.replace(/^```(?:json)?\s*/i,'').replace(/\s*```\s*$/i,'').trim();
  const objStart = text.indexOf('{'), arrStart = text.indexOf('[');
  let jsonStart = -1;
  if (objStart === -1 && arrStart === -1) throw new Error('No JSON in response.');
  if (objStart === -1) jsonStart = arrStart;
  else if (arrStart === -1) jsonStart = objStart;
  else jsonStart = Math.min(objStart, arrStart);
  const openChar = text[jsonStart], closeChar = openChar==='{' ? '}' : ']';
  let depth=0, inStr=false, escape=false, jsonEnd=-1;
  for (let i=jsonStart; i<text.length; i++) {
    const ch = text[i];
    if (escape)       { escape=false; continue; }
    if (ch==='\\')    { escape=true;  continue; }
    if (ch==='"')     { inStr=!inStr; continue; }
    if (inStr)        { continue; }
    if (ch===openChar) depth++;
    else if (ch===closeChar) { depth--; if (depth===0) { jsonEnd=i; break; } }
  }
  if (jsonEnd===-1) throw new Error('Could not find end of JSON.');
  try { return JSON.parse(text.slice(jsonStart, jsonEnd+1)); }
  catch(e) { throw new Error('JSON parse failed: ' + e.message.slice(0,80)); }
}

// ─── Resize ────────────────────────────────────────────────────────────────────
function initResize() {
  const handle = document.getElementById('resize-handle');
  const outputPane = document.getElementById('output-pane');
  if (handle && outputPane) {
    let startY=0, startH=0, dragging=false;
    handle.addEventListener('mousedown', e => {
      dragging=true; startY=e.clientY; startH=outputPane.offsetHeight;
      handle.classList.add('dragging');
      document.body.style.userSelect='none'; document.body.style.cursor='ns-resize';
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      outputPane.style.height = Math.max(60, Math.min(600, startH+(startY-e.clientY))) + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging=false; handle.classList.remove('dragging');
      document.body.style.userSelect=''; document.body.style.cursor='';
    });
  }

  const vHandle = document.getElementById('vert-resize-handle');
  const leftPanel = document.getElementById('left-panel');
  if (vHandle && leftPanel) {
    let startX=0, startW=0, vDragging=false;
    vHandle.addEventListener('mousedown', e => {
      vDragging=true; startX=e.clientX; startW=leftPanel.offsetWidth;
      vHandle.classList.add('v-dragging');
      document.body.style.userSelect='none'; document.body.style.cursor='col-resize';
    });
    document.addEventListener('mousemove', e => {
      if (!vDragging) return;
      const newW = Math.max(220, Math.min(700, startW+(e.clientX-startX)));
      leftPanel.style.width=newW+'px'; leftPanel.style.minWidth=newW+'px';
    });
    document.addEventListener('mouseup', () => {
      if (!vDragging) return;
      vDragging=false; vHandle.classList.remove('v-dragging');
      document.body.style.userSelect=''; document.body.style.cursor='';
    });
  }
}

// ─── Reference Data ────────────────────────────────────────────────────────────
const REF_DATA = {
  querying:[["SELECT col1, col2","Return specific columns"],["SELECT DISTINCT col","Unique values only"],["SELECT TOP n","First n rows (T-SQL) — use LIMIT n elsewhere"],["WHERE condition","Filter rows before grouping"],["AND / OR / NOT","AND binds tighter than OR — use parentheses"],["BETWEEN a AND b","Inclusive range"],["IN (a, b, c)","Match any value in list or subquery"],["LIKE 'val%'","% = any chars, _ = one char"],["IS NULL / IS NOT NULL","Never use = NULL"],["ORDER BY col DESC","Only clause that can use SELECT aliases"],["OFFSET n ROWS FETCH NEXT m ROWS ONLY","Pagination — requires ORDER BY"]],
  joins:[["INNER JOIN ... ON","Matching rows only"],["LEFT JOIN ... ON","All left rows, NULLs for no right match"],["FULL OUTER JOIN","All rows both sides"],["CROSS JOIN","Every row × every row"],["LEFT JOIN + WHERE b.id IS NULL","Anti-join"],["SELF JOIN","Table joined to itself — needs two aliases"]],
  aggregation:[["COUNT(*) / COUNT(col)","All rows / non-NULL only"],["COUNT(DISTINCT col)","Unique non-NULL values"],["SUM / AVG / MIN / MAX","All ignore NULLs"],["GROUP BY col","Every non-aggregate SELECT col must appear here"],["HAVING condition","Filter after grouping — WHERE cannot use aggregates"],["SUM(CASE WHEN x THEN 1 ELSE 0 END)","Conditional count"]],
  ctes:[["WITH name AS ( query )","Named temp result — lives only for this query"],[", name2 AS ( query )","Chain — comma-separated, no extra WITH"],["Cannot filter on window fn in WHERE","Wrap in CTE, filter outside"],["Recursive: anchor UNION ALL recursive","Hierarchy traversal"]],
  window:[["fn() OVER (PARTITION BY col ORDER BY col)","All 3 sub-clauses optional"],["PARTITION BY col","Reset function per group"],["ROW_NUMBER()","1,2,3 unique always"],["RANK()","1,1,3 gaps after ties"],["DENSE_RANK()","1,1,2 no gaps — use for Nth highest"],["NTILE(n)","Divide into n equal buckets"],["ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW","Running total frame"],["ROWS BETWEEN 2 PRECEDING AND CURRENT ROW","Rolling 3-period frame"]],
  nulls:[["IS NULL / IS NOT NULL","Only correct null check"],["COALESCE(a,b,c)","First non-NULL — ANSI standard"],["ISNULL(a,b)","SQL Server only"],["NULLIF(a,b)","NULL if a=b — safe division"],["NULL in aggregates","SUM/AVG/COUNT(col) ignore NULLs, COUNT(*) includes them"]],
  case:[["CASE WHEN cond THEN val ELSE val END","Evaluated left to right, first match wins"],["Always include ELSE","Without it unmatched rows return NULL silently"],["CASE inside SUM/COUNT","Conditional aggregation"]],
  strings:[["LEN(col)","Character length"],["LEFT / RIGHT(col,n)","Extract from ends"],["SUBSTRING(col,start,len)","Extract portion"],["UPPER / LOWER / TRIM","Case and whitespace"],["CONCAT(a,b)","NULL-safe concatenation"],["REPLACE(col,old,new)","Replace all occurrences"],["CHARINDEX(search,col)","Position — 0 if not found"]],
  dates:[["GETDATE() / SYSDATETIME()","Current datetime"],["CAST(GETDATE() AS DATE)","Date only"],["DATEDIFF(unit,start,end)","Difference in given unit"],["DATEADD(unit,n,date)","Add or subtract time"],["YEAR/MONTH/DAY(col)","Extract parts"],["EOMONTH(date)","Last day of month"]],
  types:[["CAST(col AS INT)","Error on failure"],["TRY_CAST(col AS INT)","NULL on failure — safe"],["CAST(5 AS FLOAT)/2 = 2.5","Integer division truncates — cast first"]],
  sets:[["UNION","Deduplicated — slower"],["UNION ALL","Keep all rows — prefer this"],["INTERSECT","In both sets"],["EXCEPT","In first but not second"]],
};
