<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f1a;--surface:#111520;--surface2:#171d2e;--surface3:#1e2640;
  --border:#232d45;--border2:#2e3a58;
  --text:#dde4f0;--muted:#6b7a99;--dim:#3d4e6e;
  --blue:#5b8dee;--blue-bg:rgba(91,141,238,.10);
  --purple:#9b7cf4;--purple-bg:rgba(155,124,244,.10);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,.10);
  --green:#3ecf8e;--green-bg:rgba(62,207,142,.10);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,.10);
  --red:#e85d75;--red-bg:rgba(232,93,117,.10);
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue);letter-spacing:.05em;margin-right:4px}
.logo span{color:var(--muted);font-weight:400}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.dialect-select{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:4px 8px;cursor:pointer;outline:none}
.dataset-pill{font-size:11px;font-family:var(--mono);color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 10px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-selector{display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden}
.cat-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);white-space:nowrap;flex-shrink:0}
.cat-pills{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.cat-pills::-webkit-scrollbar{display:none}
.cat-pill{font-family:var(--sans);font-size:11px;font-weight:500;padding:3px 10px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.cat-pill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.cat-pill.active{border-color:var(--purple);color:var(--purple);background:var(--purple-bg)}
.level-badge{font-size:11px;font-family:var(--mono);font-weight:600;padding:3px 10px;border-radius:10px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple);white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto}

.btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:5px 12px;border-radius:5px;border:1px solid;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--muted)}
.btn-ghost:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.btn-teal{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}
.btn-teal:hover:not(:disabled){filter:brightness(1.15)}
.btn-green{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:600}
.btn-green:hover:not(:disabled){filter:brightness(1.15)}
.btn-blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.btn-blue:hover:not(:disabled){filter:brightness(1.15)}

/* Main layout */
.main{display:flex;flex:1;overflow:hidden}

/* Left panel */
.left{width:40%;min-width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tab{font-size:11px;font-weight:500;padding:9px 12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.panel{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;display:none}
.panel.active{display:block}

/* Problem panel */
.req-from{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.req-title{font-size:16px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:10px}
.req-summary{font-size:12.5px;color:#8a9ab8;line-height:1.7;margin-bottom:12px}
.req-list{margin:0 0 14px 16px;display:flex;flex-direction:column;gap:6px}
.req-list li{font-size:12.5px;color:#b0bdd0;line-height:1.6}
.req-divider{height:1px;background:var(--border);margin:12px 0}
.req-submitter{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
.req-submitter span{color:var(--text);font-weight:500}

/* Schema */
.schema-tbl-name{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue);margin-bottom:4px;margin-top:12px}
.schema-tbl-name:first-child{margin-top:0}
.schema-tbl-desc{font-size:11px;color:var(--muted);margin-bottom:5px}
table.st{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px}
table.st th{background:var(--surface2);color:var(--muted);text-align:left;padding:4px 7px;border:1px solid var(--border);font-weight:500;font-size:10px}
table.st td{padding:3px 7px;border:1px solid var(--border);color:var(--text)}
table.st tr:nth-child(even) td{background:var(--surface2)}
.col-pk{color:var(--amber)}.col-type{color:var(--purple);font-family:var(--mono);font-size:10px}
.sample-label{font-size:10px;color:var(--dim);margin:7px 0 3px;letter-spacing:.05em;text-transform:uppercase;font-weight:600}
table.sd{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:12px;font-family:var(--mono)}
table.sd th{background:var(--surface3);color:var(--muted);padding:3px 6px;border:1px solid var(--border);text-align:left}
table.sd td{padding:3px 6px;border:1px solid var(--border);color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
table.sd tr:nth-child(even) td{background:var(--surface2)}
.result-table-wrap{overflow-x:auto}

/* Diff tab */
.diff-intro{font-size:11.5px;color:var(--muted);margin-bottom:12px;line-height:1.6}
table.diff{width:100%;border-collapse:collapse;font-size:10px}
table.diff th{background:var(--surface3);padding:5px 7px;border:1px solid var(--border);text-align:left;font-size:10px;color:var(--muted);font-weight:600}
table.diff th.active-dialect{color:var(--blue);border-bottom:2px solid var(--blue)}
table.diff td{padding:4px 7px;border:1px solid var(--border);font-family:var(--mono);font-size:10px;vertical-align:top}
table.diff td:first-child{color:var(--text);font-family:var(--sans);font-size:11px}
table.diff td.hl{color:var(--blue);background:var(--blue-bg)}

/* SQL Reference tab */
.ref-section{margin-bottom:18px}
.ref-section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.ref-row{display:flex;gap:8px;align-items:baseline;padding:4px 0;border-bottom:1px solid rgba(35,45,69,.5)}
.ref-kw{font-family:var(--mono);font-size:10.5px;color:var(--blue);min-width:160px;flex-shrink:0}
.ref-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* Right panel — editor + output split */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lang-tag{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.lang-dot{width:7px;height:7px;border-radius:50%;background:var(--blue)}
.editor-btns{display:flex;gap:6px}

.editor-wrap{flex:1;position:relative;overflow:hidden;min-height:80px}
#editor{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;line-height:1.75;border:none;outline:none;resize:none;padding:16px 16px 16px 48px;tab-size:2}
.lnums{position:absolute;left:0;top:0;bottom:0;width:38px;background:var(--surface);border-right:1px solid var(--border);padding:16px 6px 16px 0;font-family:var(--mono);font-size:12px;line-height:1.75;color:var(--dim);text-align:right;pointer-events:none;overflow:hidden;white-space:pre;user-select:none}

/* Output pane — always visible, resizable feel */
.output-pane{flex-shrink:0;height:220px;border-top:2px solid var(--border2);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.output-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.output-title{font-size:11px;font-weight:600;display:flex;align-items:center;gap:7px;font-family:var(--mono)}
.output-status{width:7px;height:7px;border-radius:50%;background:var(--dim)}
.output-status.running{background:var(--blue);animation:pulse 1s infinite}
.output-status.correct{background:var(--green);box-shadow:0 0 6px var(--green)}
.output-status.partial{background:var(--amber)}
.output-status.error{background:var(--red)}
.output-body{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.loading-bar{height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);background-size:200% 100%;animation:shimmer 1s infinite;flex-shrink:0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Output content */
.verdict-pill{font-size:11px;font-family:var(--mono);padding:2px 9px;border-radius:10px;border:1px solid}
.vp-correct{background:var(--green-bg);color:var(--green);border-color:var(--green)}
table.rt{border-collapse:collapse;font-size:11px;font-family:var(--mono);min-width:100%}
table.rt th{background:var(--surface3);color:var(--blue);padding:4px 9px;border:1px solid var(--border);white-space:nowrap;font-size:10px}
table.rt td{padding:3px 9px;border:1px solid var(--border);color:var(--text);white-space:nowrap}
table.rt tr:nth-child(even) td{background:var(--surface2)}
.rt-note{font-size:10px;color:var(--muted);margin-top:4px}
.error-box{background:var(--red-bg);border:1px solid var(--red);border-radius:5px;padding:8px 11px;font-family:var(--mono);font-size:11px;color:var(--red)}
.out-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;color:var(--muted)}
.out-label.correct{color:var(--green)}
.out-label.model{color:var(--purple)}
.out-section{margin-bottom:12px}
.model-code{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;font-family:var(--mono);font-size:11px;color:var(--text);white-space:pre-wrap;line-height:1.65}
.hint-item{background:var(--amber-bg);border:1px solid rgba(245,166,35,.25);border-radius:5px;padding:7px 10px;font-size:11.5px;color:#d4a843;margin-bottom:5px;line-height:1.5}
.hint-num{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);margin-bottom:2px}
.empty-output{color:var(--dim);font-size:12px;font-family:var(--mono);padding:8px 0}

/* Bottom bar */
.bottom-bar{background:var(--surface);border-top:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.bottom-left{display:flex;gap:6px;align-items:center}
.bottom-right{display:flex;gap:6px}

/* Skeletons */
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px}
.sl{height:12px;margin-bottom:8px}
.empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.7}
.empty-icon{font-size:22px;margin-bottom:8px;opacity:.4}

/* Difficulty info button + popover */
.diff-info-btn{width:18px;height:18px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;line-height:1;transition:all .15s;flex-shrink:0}
.diff-info-btn:hover{border-color:var(--blue);color:var(--blue)}
.diff-popover{display:none;position:absolute;top:52px;left:50%;transform:translateX(-50%);z-index:100;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:14px 16px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.diff-popover.open{display:block}
.diff-pop-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.diff-pop-item{margin-bottom:12px}
.diff-pop-item:last-child{margin-bottom:0}
.diff-pop-label{font-size:11px;font-weight:600;font-family:var(--mono);margin-bottom:4px}
.diff-pop-label.easy{color:var(--green)}
.diff-pop-label.medium{color:var(--amber)}
.diff-pop-label.hard{color:var(--red)}
.diff-pop-desc{font-size:11.5px;color:var(--muted);line-height:1.6}

/* SQL Reference bottom bar */
.ref-bar{border-top:1px solid var(--border2);background:var(--surface);flex-shrink:0;display:flex;flex-direction:column;max-height:200px}
.ref-bar-top{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.ref-bar-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);white-space:nowrap}
.ref-cat-select{flex:1;font-family:var(--sans);font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:4px 7px;cursor:pointer;outline:none}
.ref-cat-select:focus{border-color:var(--blue)}
.ref-content{overflow-y:auto;padding:4px 14px 8px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.ref-row{display:flex;gap:10px;align-items:baseline;padding:4px 0;border-bottom:1px solid rgba(35,45,69,.4)}
.ref-row:last-child{border-bottom:none}
.ref-kw{font-family:var(--mono);font-size:10.5px;color:var(--blue);min-width:150px;flex-shrink:0;line-height:1.5}
.ref-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* Feedback pane */
.feedback-pane{border-top:2px solid var(--border2);background:var(--surface2);flex-shrink:0;max-height:220px;display:flex;flex-direction:column;overflow:hidden}
.feedback-pane-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.feedback-pane-body{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.fb-correct{color:var(--green);font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fb-incorrect{color:var(--amber);font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}

/* Resize handle */
.resize-handle{height:5px;background:var(--border);cursor:ns-resize;flex-shrink:0;transition:background .15s;position:relative;z-index:5}
.resize-handle:hover,.resize-handle.dragging{background:var(--blue)}
.resize-handle::after{content:'';display:block;width:30px;height:3px;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);margin:1px auto 0}

/* Learn popover */
.learn-popover{display:none;position:absolute;top:36px;right:0;z-index:100;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:14px 16px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.learn-popover.open{display:block}
.learn-cats{display:flex;flex-direction:column;gap:5px}
.learn-cat-btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:7px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:8px}
.learn-cat-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.learn-cat-btn .cat-icon{font-size:13px;width:18px;text-align:center}
.learn-mode-badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:10px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple);margin-left:6px}

/* Learning guidance in feedback pane */
.learn-concept{background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:12px;margin-bottom:10px}
.learn-concept-title{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:6px;letter-spacing:.04em}
.learn-concept-body{font-size:12px;color:#b0bdd0;line-height:1.7}
.learn-concept-body code{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;color:var(--blue)}
.learn-sql{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;font-family:var(--mono);font-size:11px;color:var(--text);white-space:pre-wrap;line-height:1.65;margin-top:6px}

/* Concept guide in request panel */
.concept-guide{background:var(--surface3);border:1px solid var(--border2);border-left:3px solid var(--purple);border-radius:6px;padding:12px 14px;margin-bottom:16px}
.concept-guide-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.concept-guide-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--purple)}
.concept-guide-level{font-size:10px;font-family:var(--mono);color:var(--muted)}
.concept-guide-desc{font-size:12.5px;color:#b0bdd0;line-height:1.7;margin-bottom:10px}
.concept-syntax-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.concept-syntax{font-family:var(--mono);font-size:11px;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:9px 11px;white-space:pre-wrap;line-height:1.65}
.concept-tip{font-size:11.5px;color:var(--amber);background:var(--amber-bg);border:1px solid rgba(245,166,35,.2);border-radius:5px;padding:7px 10px;margin-top:8px;line-height:1.5}
.concept-tip::before{content:"Tip: ";font-weight:600}
.level-progress{display:flex;align-items:center;gap:6px;margin-top:10px}
.level-pip{width:16px;height:4px;border-radius:2px;background:var(--border2)}
.level-pip.filled{background:var(--purple)}

/* Output verdict and hints */
.out-verdict-pill{font-size:10px;font-family:var(--mono);font-weight:600;padding:2px 9px;border-radius:10px;border:1px solid;margin-left:8px}
.vp-correct{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.vp-close{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.vp-incorrect{background:var(--red-bg);color:var(--red);border-color:var(--red)}
#out-hints-area{border-top:1px solid var(--border);padding:8px 12px;flex-shrink:0;background:var(--surface)}
.out-hint-row{font-size:11.5px;color:var(--muted);padding:3px 0;line-height:1.5;display:flex;gap:7px;align-items:baseline}
.out-hint-row::before{content:"→";color:var(--amber);flex-shrink:0;font-size:10px}
.run-btn-incorrect{background:transparent;border-color:var(--red);color:var(--red)}
.run-btn-close{background:transparent;border-color:var(--amber);color:var(--amber)}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">SQL<span>.learn</span></div>
  <div class="sep"></div>
  <select class="dialect-select" id="dialect-select" onchange="setDialect(this.value)">
    <option value="tsql">T-SQL</option>
    <option value="mysql">MySQL</option>
    <option value="postgres">PostgreSQL</option>
    <option value="sqlite">SQLite</option>
    <option value="spark">Spark SQL</option>
  </select>
  <div class="sep"></div>
  <div style="position:relative;display:flex;align-items:center;gap:5px">
    <button class="diff-info-btn" onclick="toggleSqlDiff(event)" title="SQL dialect differences" style="border-radius:5px;width:auto;padding:3px 8px;font-size:11px;font-weight:500;font-family:var(--sans)">SQL Diff</button>
    <div class="diff-popover" id="sql-diff-popover" style="top:34px;left:0;transform:none;width:560px;max-height:420px;overflow-y:auto"></div>
  </div>
  <div class="sep"></div>
  <!-- Category selector -->
  <div class="cat-selector" id="cat-selector">
    <span class="cat-label">Topic:</span>
    <div class="cat-pills" id="cat-pills"></div>
  </div>

<script>
const API = 'https://api.anthropic.com/v1/messages';
const MODEL = 'claude-sonnet-4-20250514';

let dataset = null;
let question = null;
let dialect = 'tsql';
let hints = [];
let hintShown = 0;
let qNum = 0;
let isRunning = false, isGenerating = false;
let lastCorrect = false;
let currentCategory = null;   // active learning category key
let categoryLevel = {};        // { categoryKey: levelNumber }

const DIALECTS = { tsql:'T-SQL (SQL Server)', mysql:'MySQL', postgres:'PostgreSQL', sqlite:'SQLite', spark:'Spark SQL' };

const DATASET_CONTEXTS = [
  { industry:'Healthcare',         desc:'Regional hospital with admissions, billing and staff data' },
  { industry:'Retail',             desc:'National retail chain with sales, inventory and customers' },
  { industry:'SaaS',               desc:'B2B software company with subscriptions and usage events' },
  { industry:'Financial Services', desc:'Investment firm with accounts, transactions and portfolios' },
  { industry:'E-commerce',         desc:'Online marketplace with orders, products and sellers' },
  { industry:'Human Resources',    desc:'Enterprise HR system with employees, payroll and reviews' },
  { industry:'Supply Chain',       desc:'Logistics company with shipments, warehouses and vendors' },
  { industry:'Telecom',            desc:'Telecom provider with customers, plans and usage data' },
];

// ── Learning categories ───────────────────────────────────────────────────────
const CATEGORIES = [
  { key:'select',   label:'SELECT & WHERE',     icon:'▦' },
  { key:'joins',    label:'JOINs',              icon:'⇌' },
  { key:'groupby',  label:'GROUP BY',           icon:'∑' },
  { key:'subquery', label:'Subqueries',         icon:'⊂' },
  { key:'case',     label:'CASE & COALESCE',    icon:'?' },
  { key:'cte',      label:'CTEs',               icon:'⧉' },
  { key:'window',   label:'Window functions',   icon:'⊞' },
  { key:'lag_lead', label:'LAG & LEAD',         icon:'↔' },
  { key:'running',  label:'Running totals',     icon:'⊕' },
  { key:'dates',    label:'Date functions',     icon:'📅'},
  { key:'strings',  label:'String functions',   icon:'Aa' },
];

// Concept knowledge base — explanation, syntax, tip, per level description
const CONCEPT_KNOWLEDGE = {
  select: {
    title: 'SELECT & WHERE',
    explanation: 'SELECT chooses which columns to return. WHERE filters which rows are included. WHERE runs before SELECT, so you cannot use a column alias defined in SELECT inside WHERE.',
    syntax: 'SELECT col1, col2, expression AS alias\nFROM   TableName\nWHERE  condition AND/OR condition\nORDER BY col [ASC|DESC]',
    tip: 'AND binds tighter than OR — use parentheses when mixing them to be explicit.',
    levels: ['Single table, one condition','Multiple conditions with AND/OR','BETWEEN, IN, LIKE, IS NULL patterns','Calculated columns and CASE in SELECT','Combined filtering with date arithmetic'],
  },
  joins: {
    title: 'JOINs',
    explanation: 'JOINs combine rows from two or more tables. INNER JOIN returns only matched rows. LEFT JOIN returns all rows from the left table, with NULLs for unmatched right rows. A LEFT JOIN that filters WHERE right.col IS NULL becomes an anti-join.',
    syntax: 'SELECT a.col, b.col\nFROM   TableA a\nINNER JOIN TableB b ON a.id = b.id\n\n-- Anti-join (rows in A with no match in B):\nFROM TableA a\nLEFT JOIN TableB b ON a.id = b.id\nWHERE b.id IS NULL',
    tip: 'Always alias your tables when joining — it prevents ambiguity and keeps queries readable.',
    levels: ['Two-table INNER JOIN','LEFT JOIN to include unmatched rows','Anti-join: LEFT JOIN + WHERE NULL','Three-table JOIN','Self-join to compare rows within the same table'],
  },
  groupby: {
    title: 'GROUP BY & HAVING',
    explanation: 'GROUP BY collapses rows into groups so you can aggregate them. Every non-aggregate column in SELECT must appear in GROUP BY. HAVING filters after grouping — use it when you need to filter on an aggregate result like COUNT or SUM.',
    syntax: 'SELECT   col, COUNT(*), SUM(amount), AVG(col)\nFROM     TableName\nWHERE    condition          -- filters rows BEFORE grouping\nGROUP BY col\nHAVING   COUNT(*) > 5      -- filters groups AFTER grouping',
    tip: 'WHERE cannot reference aggregates — that is what HAVING is for. Remember: WHERE before grouping, HAVING after.',
    levels: ['Single column GROUP BY with COUNT','Multiple aggregates in one query','GROUP BY with HAVING filter','Conditional aggregation: SUM(CASE WHEN...)','Multi-column GROUP BY with complex filters'],
  },
  subquery: {
    title: 'Subqueries',
    explanation: 'A subquery is a SELECT nested inside another query. In WHERE it filters rows. In FROM it acts as a derived table you can query against. A correlated subquery references the outer query per row. EXISTS is faster than IN when checking existence because it stops at the first match.',
    syntax: '-- In WHERE (list)\nWHERE col IN (SELECT col FROM t WHERE ...)\n\n-- EXISTS (faster for existence checks)\nWHERE EXISTS (SELECT 1 FROM t WHERE t.id = outer.id)\n\n-- Derived table in FROM\nFROM (SELECT col, COUNT(*) AS cnt FROM t GROUP BY col) sub\nWHERE sub.cnt > 5',
    tip: 'Use EXISTS when you only care whether a match exists — it short-circuits as soon as one row is found.',
    levels: ['Scalar subquery in WHERE','IN with subquery','EXISTS vs IN','Derived table subquery in FROM','Correlated subquery per row'],
  },
  case: {
    title: 'CASE & Conditional Logic',
    explanation: 'CASE is SQL\'s if/else — it returns a value based on conditions and can appear anywhere a value can. COALESCE returns the first non-NULL from a list. NULLIF returns NULL when two values are equal, which is essential for avoiding divide-by-zero errors.',
    syntax: 'CASE\n  WHEN age < 18 THEN \'Minor\'\n  WHEN age < 65 THEN \'Adult\'\n  ELSE \'Senior\'       -- always include ELSE\nEND AS age_group\n\nCOALESCE(colA, colB, \'default\')  -- first non-NULL\nNULLIF(col, 0)                    -- safe division',
    tip: 'Always include ELSE in CASE — without it, unmatched rows silently return NULL and can corrupt aggregations.',
    levels: ['Basic CASE for labeling rows','CASE with multiple conditions and ELSE','CASE inside an aggregate (conditional count)','COALESCE and NULLIF for null handling','CASE in ORDER BY and combined scenarios'],
  },
  cte: {
    title: 'Common Table Expressions (CTEs)',
    explanation: 'A CTE (WITH clause) gives a name to a subquery so you can reference it like a table. It lives only for the duration of the query. CTEs are the solution when you need to filter on a window function result — calculate in the CTE, filter outside. Chain multiple CTEs with commas.',
    syntax: 'WITH Step1 AS (\n  SELECT col, COUNT(*) AS cnt\n  FROM   TableName\n  GROUP BY col\n),\nStep2 AS (\n  SELECT *, RANK() OVER (ORDER BY cnt DESC) AS rnk\n  FROM   Step1\n)\nSELECT * FROM Step2 WHERE rnk <= 3',
    tip: 'You cannot use a window function result in WHERE in the same query. Wrap it in a CTE, then filter in the outer SELECT.',
    levels: ['Single CTE replacing a subquery','CTE with aggregation','Two chained CTEs','CTE to enable filtering on a calculated value','Recursive CTE for hierarchy traversal'],
  },
  window: {
    title: 'Window Functions',
    explanation: 'Window functions calculate across a set of rows related to the current row without collapsing them. OVER() defines the window. PARTITION BY divides rows into groups. ORDER BY inside OVER defines the row sequence. ROW_NUMBER always gives unique numbers; DENSE_RANK handles ties without gaps.',
    syntax: 'fn() OVER (\n  PARTITION BY group_col   -- optional: reset per group\n  ORDER BY   order_col     -- defines row sequence\n)\n\nROW_NUMBER()  -- 1,2,3 unique always\nRANK()        -- 1,1,3 gaps after ties\nDENSE_RANK()  -- 1,1,2 no gaps',
    tip: 'For "Nth highest" problems always use DENSE_RANK — RANK skips numbers after ties which produces incorrect results.',
    levels: ['ROW_NUMBER to number rows','RANK vs DENSE_RANK with ties','PARTITION BY to rank within groups','NTILE for percentile buckets','Top-N per group using ROW_NUMBER in a CTE'],
  },
  lag_lead: {
    title: 'LAG & LEAD',
    explanation: 'LAG looks back N rows in the ordered window. LEAD looks forward N rows. Both return NULL at the edges where there is no prior or next row. The third argument is a default value. These are essential for period-over-period comparisons and detecting gaps between events.',
    syntax: 'LAG (col, 1, default) OVER (PARTITION BY id ORDER BY date)\nLEAD(col, 1, default) OVER (PARTITION BY id ORDER BY date)\n\n-- Period-over-period change:\ncol - LAG(col) OVER (PARTITION BY id ORDER BY date) AS change\n\n-- Gap detection:\nDATEDIFF(day, LAG(date) OVER (ORDER BY date), date) AS gap_days',
    tip: 'The third argument to LAG/LEAD sets the default when there is no prior/next row — use 0 for numeric comparisons so the first row does not produce NULL.',
    levels: ['LAG to get previous row value','Period-over-period difference with LAG','LEAD to look at next row','Gap detection between consecutive rows','Combining LAG and LEAD in one query'],
  },
  running: {
    title: 'Running Totals & Rolling Averages',
    explanation: 'Aggregate window functions apply SUM, AVG, COUNT etc. over a frame of rows without collapsing them. The frame clause (ROWS BETWEEN) defines which rows each calculation sees. UNBOUNDED PRECEDING means from the very first row. CURRENT ROW is the default upper bound.',
    syntax: '-- Running total\nSUM(col) OVER (\n  PARTITION BY dept\n  ORDER BY   date\n  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n)\n\n-- Rolling 3-period average\nAVG(col) OVER (\n  PARTITION BY dept\n  ORDER BY   date\n  ROWS BETWEEN 2 PRECEDING AND CURRENT ROW\n)',
    tip: 'ROWS counts physical rows. RANGE uses the value of ORDER BY — useful for date-based windows where multiple rows share the same date.',
    levels: ['Simple running total','Running total partitioned by group','Rolling N-period average','Cumulative percentage share','Combined running total and rolling average'],
  },
  dates: {
    title: 'Date Functions',
    explanation: 'Date functions let you extract parts of dates, calculate differences, add or subtract time, and format dates. DATEDIFF and DATEADD are the workhorses. Avoid wrapping indexed date columns in functions in WHERE — it prevents index seeks. Use range conditions instead.',
    syntax: 'GETDATE()                           -- current datetime\nCAST(GETDATE() AS DATE)            -- date only\nDATEDIFF(day,   start_col, end_col) -- difference in days\nDATEADD(month, -3, GETDATE())       -- 3 months ago\nYEAR(col)  MONTH(col)  DAY(col)\nEOMONTH(col)                        -- last day of month',
    tip: 'Do not use YEAR(col) = 2024 in WHERE — it prevents index seeks. Use: col BETWEEN \'2024-01-01\' AND \'2024-12-31\' instead.',
    levels: ['DATEDIFF to calculate durations','DATEADD for date arithmetic','Extracting YEAR MONTH DAY parts','Date range filtering with BETWEEN','Period grouping and EOMONTH'],
  },
  strings: {
    title: 'String Functions',
    explanation: 'String functions manipulate and extract text. CONCAT handles NULLs better than + because it treats NULL as empty string. CHARINDEX finds a substring position. SUBSTRING extracts a portion. LEN measures length.',
    syntax: 'LEN(col)\nLEFT(col, 3)    RIGHT(col, 4)\nSUBSTRING(col, start, length)\nUPPER(col)     LOWER(col)     TRIM(col)\nCONCAT(first, \' \', last)\nREPLACE(col, \'old\', \'new\')\nCHARINDEX(\'@\', email)',
    tip: 'CONCAT(a, b) is safer than a + b — if either operand is NULL, + returns NULL but CONCAT treats it as empty string.',
    levels: ['LEN, UPPER, LOWER, TRIM','LEFT, RIGHT, SUBSTRING','CONCAT and REPLACE','CHARINDEX to find substrings','Combined string manipulation'],
  },
};

// Level descriptions per category for prompt building
function getLevelDesc(catKey, level) {
  const descs = {
    1: 'Level 1 (beginner): single isolated use of the concept, minimal complexity, straightforward scenario',
    2: 'Level 2 (basic+): add a filter condition or a second table, slightly more realistic scenario',
    3: 'Level 3 (intermediate): combine the concept with a JOIN or aggregation, multi-step thinking required',
    4: 'Level 4 (advanced): multi-table business scenario requiring the concept plus one other technique',
    5: 'Level 5+ (complex): sophisticated scenario, concept used in a non-obvious way, may require a CTE wrapper',
  };
  return descs[Math.min(level, 5)] || descs[5];
}

// ── Category progression tracking ────────────────────────────────────────────
function getLevel(catKey) {
  return categoryLevel[catKey] || 1;
}

function advanceLevel(catKey) {
  categoryLevel[catKey] = (categoryLevel[catKey] || 1) + 1;
  updateLevelBadge();
}

function updateLevelBadge() {
  if (!currentCategory) return;
  const lvl = getLevel(currentCategory);
  document.getElementById('level-badge').style.display = 'inline-flex';
  document.getElementById('level-num').textContent = lvl;
}

// ── Category pills in header ──────────────────────────────────────────────────
function renderCategoryPills() {
  const el = document.getElementById('cat-pills');
  if (!el) return;
  el.innerHTML = CATEGORIES.map(function(cat) {
    return '<button class="cat-pill" data-cat="' + cat.key + '" onclick="selectCategory(\'' + cat.key + '\')">' +
           cat.icon + ' ' + cat.label + '</button>';
  }).join('');
}

function selectCategory(key) {
  if (isGenerating || isRunning) return;
  currentCategory = key;
  // Highlight active pill
  document.querySelectorAll('.cat-pill').forEach(function(p) {
    p.classList.toggle('active', p.dataset.cat === key);
  });
  updateLevelBadge();
  // Enable next question button
  document.getElementById('new-q-btn').disabled = false;
  // Auto-generate first question
  newQuestion();
}

// ── Main question generation ──────────────────────────────────────────────────
function newQuestion() {
  if (isGenerating || isRunning || !currentCategory) return;
  isGenerating = true;
  document.getElementById('new-q-btn').disabled = true;
  generateLearnQuestion().finally(function() {
    isGenerating = false;
    document.getElementById('new-q-btn').disabled = false;
  });
}

async function generateLearnQuestion() {
  if (!currentCategory) return;
  const cat = CATEGORIES.find(function(c) { return c.key === currentCategory; });
  const knowledge = CONCEPT_KNOWLEDGE[currentCategory];
  const level = getLevel(currentCategory);
  const levelDesc = getLevelDesc(currentCategory, level);
  const ctx = DATASET_CONTEXTS[Math.floor(Math.random() * DATASET_CONTEXTS.length)];

  qNum++;
  hints = [];
  hintShown = 0;
  dataset = null;
  question = null;
  updateHintBtn();
  showProblemSkeleton();
  clearEditor(true);
  setOutputEmpty();
  closeFeedbackPane();
  hideNextBtn();
  document.getElementById('run-btn').disabled = true;
  document.getElementById('hint-btn').disabled = true;

  const prompt = 'Generate a SQL learning exercise teaching: ' + cat.label + '.\n' +
    'Industry: ' + ctx.industry + '. Level: ' + levelDesc + '.\n' +
    'JSON only:{"dataset":{"name":"CoName","tables":[{"name":"t","description":"desc",' +
    '"columns":[{"name":"c","type":"INT|VARCHAR(50)|DATE|DECIMAL(10,2)","note":"PK|FK->t|empty"}],' +
    '"rows":[{"c":"v"}]}]},' +
    '"question":{"title":"5-7 word title","submitted_by":"Name, Job Title",' +
    '"description":"2-3 sentences. Explain the business scenario clearly. State exactly what columns to return and how to order or filter. Reference real column/table names.",' +
    '"what_to_use":"One sentence telling the learner exactly which SQL concept/function they need for this problem (e.g. Use a LEFT JOIN with a WHERE IS NULL filter)",' +
    '""example_output":"|col|col|\\n|---|---|\\n|v|v|",' +
    '"constraints":["specific requirement with real col names"],' +
    '"hints":["concept reminder","more specific approach","near-answer"],' +
    '"teaching_note":"1 sentence: what specifically this exercise trains about ' + cat.label + '"}}\n' +
    'Rules: 2 tables, 4 cols each, 5 rows each, snake_case, short values, FK consistency.\n' +
    'MUST require ' + cat.label + ' to solve. Match the level complexity exactly.';

  try {
    const combined = await callClaude(prompt, 1400);
    dataset = combined.dataset;
    question = combined.question;
    if (dataset) dataset.industry = ctx.industry;
    hints = question.hints || [];
    hintShown = 0;
    updateHintBtn();
    renderProblem();
    document.getElementById('run-btn').disabled = false;
    document.getElementById('showme-btn').disabled = false;
    // Reset run button to teal
    document.getElementById('run-btn').className = 'btn btn-teal';
    document.getElementById('run-btn').textContent = 'Run ▶';
    // Show concept guide in feedback pane immediately
    showConceptGuide();
  } catch(e) {
    document.getElementById('tab-problem').innerHTML = '<div class="empty"><div>Failed: ' + esc(e.message) + '</div><button class="btn btn-ghost" style="margin-top:10px" onclick="newQuestion()">Retry</button></div>';
  }
}

function showConceptGuide() {
  if (!currentCategory) return;
  const knowledge = CONCEPT_KNOWLEDGE[currentCategory];
  const level = getLevel(currentCategory);
  const maxPips = 5;
  const pips = Array.from({length: maxPips}, function(_, i) {
    return '<div class="level-pip' + (i < level ? ' filled' : '') + '"></div>';
  }).join('');

  const fpane = document.getElementById('feedback-pane');
  fpane.style.display = 'flex';
  fpane.style.flexDirection = 'column';
  document.getElementById('fb-status').className = 'output-status partial';
  document.getElementById('fb-title').textContent = knowledge.title + ' — Concept guide';

  let html = '<div class="learn-concept">' +
    '<div class="learn-concept-title">What is this?</div>' +
    '<div class="learn-concept-body">' + esc(knowledge.explanation) + '</div>' +
    '</div>' +
    '<div class="learn-concept">' +
    '<div class="learn-concept-title">Syntax pattern</div>' +
    '<div class="learn-sql">' + esc(knowledge.syntax) + '</div>' +
    '</div>' +
    '<div class="learn-concept">' +
    '<div class="learn-concept-title">Key tip</div>' +
    '<div class="learn-concept-body" style="color:var(--amber)">' + esc(knowledge.tip) + '</div>' +
    '</div>';

  if (question && question.what_to_use) {
    html += '<div class="learn-concept" style="border-left-color:var(--teal)">' +
      '<div class="learn-concept-title" style="color:var(--teal)">For this question</div>' +
      '<div class="learn-concept-body">' + esc(question.what_to_use) + '</div>' +
      '</div>';
  }
  if (question && question.teaching_note) {
    html += '<div class="learn-concept" style="border-left-color:var(--blue)">' +
      '<div class="learn-concept-title" style="color:var(--blue)">What you are practising</div>' +
      '<div class="learn-concept-body">' + esc(question.teaching_note) + '</div>' +
      '</div>';
  }

  html += '<div class="level-progress">' +
    '<span style="font-size:10px;color:var(--muted);margin-right:4px">Progress:</span>' +
    pips + '<span style="font-size:10px;color:var(--muted);margin-left:4px">Level ' + level + ' of 5+</span>' +
    '</div>';

  document.getElementById('fb-body').innerHTML = html;
}

// ── Run query ─────────────────────────────────────────────────────────────────
async function runQuery() {
  if (!question || !dataset || isRunning || isGenerating) return;
  const sql = document.getElementById('editor').value.trim();
  if (!sql) { setOutputMsg('Write a query first.'); return; }

  isRunning = true;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('run-btn').textContent = 'Running...';
  document.getElementById('out-status').className = 'output-status running';
  document.getElementById('out-title').textContent = 'Running...';
  document.getElementById('out-body').innerHTML = '';
  document.getElementById('out-rowcount').textContent = '';
  document.getElementById('loading-bar-wrap').style.display = 'block';

  const sampleData = dataset.tables.map(function(t) {
    if (!t.rows || !t.rows.length) return t.name + ': (no rows)';
    const cols = t.columns.map(function(col) { return col.name; });
    const rows = t.rows.slice(0, 3).map(function(r) { return cols.map(function(col) { return r[col]; }).join('|'); });
    return t.name + '[' + cols.join('|') + ']\n' + rows.join('\n');
  }).join('\n\n');

  const schemaLine = dataset.tables.map(function(t) {
    return t.name + '(' + t.columns.map(function(col) { return col.name; }).join(',') + ')';
  }).join(' ');

  const taskDesc = question.description || '';

  const prompt = 'Simulate SQL. DB:' + dataset.name + ' Dialect:' + DIALECTS[dialect] + '\n' +
    'Schema:' + schemaLine + '\nData:\n' + sampleData + '\n' +
    'Task:' + taskDesc + '\nQuery:\n' + sql + '\n\n' +
    'JSON:{"verdict":"correct|partial|incorrect|error","is_acceptable":true,' +
    '"error_message":null,"cols":["c"],"rows":[[v]],"row_note":null,' +
    '"model_answer":"clean SQL"}\n' +
    'is_acceptable=true only if query fully answers task. cols+rows=actual output max 5 rows.';

  try {
    const result = await callClaude(prompt, 900);
    if (result.model_answer && question) question.model_answer_cache = result.model_answer;
    if (result.is_acceptable) {
      lastCorrect = true;
      advanceLevel(currentCategory);
      showNextBtn();
    } else {
      lastCorrect = false;
    }
    renderResult(result);
  } catch(e) {
    document.getElementById('out-status').className = 'output-status error';
    document.getElementById('out-title').textContent = 'Error';
    document.getElementById('out-body').innerHTML = '<div class="error-box">' + esc(e.message) + '</div>';
  }

  isRunning = false;
  document.getElementById('loading-bar-wrap').style.display = 'none';
  document.getElementById('run-btn').disabled = false;
}

function showMeAnswer() {
  if (!question) return;
  if (question.model_answer_cache) {
    document.getElementById('editor').value = question.model_answer_cache;
    updateLineNumbers();
    return;
  }
  const btn = document.getElementById('showme-btn');
  btn.disabled = true;

  if (!dataset || !question) { btn.disabled = false; btn.textContent = 'Show me'; return; }
  const schemaLine = dataset.tables.map(function(t) {
    return t.name + '(' + t.columns.map(function(col) { return col.name; }).join(',') + ')';
  }).join(' ');
  const msgContent = 'Write a ' + DIALECTS[dialect] + ' SQL query for: ' +

    '. SQL only, no markdown, no explanation.';
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: MODEL, max_tokens: 400,
      messages: [{ role: 'user', content: msgContent }] }),
  }).then(function(r) { return r.json(); }).then(function(d) {
    const sql = (d.content && d.content[0] && d.content[0].text) ? d.content[0].text.trim() : '';
    const clean = sql.replace(/^```(?:sql)?\s*/i,'').replace(/\s*```\s*$/i,'').trim();

    document.getElementById('editor').value = clean;
    updateLineNumbers();
    btn.disabled = false;
    btn.textContent = 'Show me';
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = 'Show me';
  });
}


function renderMarkdownTable(text) {
  if (!text) return '';
  // Check if it looks like a markdown table
  if (!text.includes('|')) return '<pre style="font-family:var(--mono);font-size:11px;white-space:pre-wrap">' + esc(text) + '</pre>';
  const lines = text.trim().split('\n').filter(function(l) { return l.trim(); });
  if (lines.length < 2) return '<pre style="font-family:var(--mono);font-size:11px;white-space:pre-wrap">' + esc(text) + '</pre>';

  let html = '<div class="result-table-wrap"><table class="rt"><thead><tr>';
  // Parse header
  const headers = lines[0].split('|').map(function(h) { return h.trim(); }).filter(function(h) { return h; });
  headers.forEach(function(h) { html += '<th>' + esc(h) + '</th>'; });
  html += '</tr></thead><tbody>';
  // Skip separator line (---)
  const dataLines = lines.slice(2);
  dataLines.forEach(function(line) {
    if (!line.trim() || line.trim().replace(/[|\-\s]/g,'') === '') return;
    const cells = line.split('|').map(function(c) { return c.trim(); }).filter(function(c, i, arr) {
      return !(i === 0 && c === '') && !(i === arr.length-1 && c === '');
    });
    html += '<tr>';
    cells.forEach(function(cell) { html += '<td>' + esc(cell) + '</td>'; });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderProblem() {
  if (!question) return;
  const constraints = (question.constraints || []).map(function(r) { return '<li>' + esc(r) + '</li>'; }).join('');

  let schemaHtml = '';
  if (dataset && dataset.tables) {
    schemaHtml += '<div class="req-divider"></div>';
    schemaHtml += '<div class="req-section-label">Database: ' + esc(dataset.name || '') + '</div>';
    dataset.tables.forEach(function(t) {
      schemaHtml += '<div class="schema-tbl-name">' + esc(t.name) + '</div>';
      schemaHtml += '<div class="schema-tbl-desc">' + esc(t.description || '') + '</div>';
      schemaHtml += '<table class="st"><thead><tr><th>Column</th><th>Type</th><th>Note</th></tr></thead><tbody>';
      t.columns.forEach(function(col) {
        const pk = col.note === 'PK';
        schemaHtml += '<tr><td class="' + (pk ? 'col-pk' : '') + '">' + esc(col.name) + (pk ? ' &#128273;' : '') + '</td>' +
          '<td class="col-type">' + esc(col.type) + '</td>' +
          '<td style="color:var(--muted);font-size:10px">' + esc(col.note || '') + '</td></tr>';
      });
      schemaHtml += '</tbody></table>';
      if (t.rows && t.rows.length) {
        const cols = t.columns.map(function(col) { return col.name; });
        schemaHtml += '<div class="sample-label">Sample data</div><div class="result-table-wrap"><table class="sd"><thead><tr>';
        cols.forEach(function(col) { schemaHtml += '<th>' + esc(col) + '</th>'; });
        schemaHtml += '</tr></thead><tbody>';
        t.rows.forEach(function(row) {
          schemaHtml += '<tr>';
          cols.forEach(function(col) { schemaHtml += '<td>' + (row[col] === null || row[col] === undefined ? '<span style="color:var(--dim)">NULL</span>' : esc(String(row[col]))) + '</td>'; });
          schemaHtml += '</tr>';
        });
        schemaHtml += '</tbody></table></div>';

    '<div class="req-title">' + esc(question.title) + '</div>' +
    '<div class="req-summary">' + esc(question.description || '') + '</div>' +
    (constraints ? '<div class="req-section-label">Constraints</div><ul class="req-list">' + constraints + '</ul>' : '') +
    '<div class="req-section-label">Expected output</div>' +

    '<div class="req-divider"></div>' +
    '<div class="req-submitter"><div>Submitted by</div><span>' + esc(question.submitted_by || '') + '</span></div>';

function renderResult(r) {
  const isError   = r.verdict === 'error';
  const isCorrect = r.is_acceptable;
  const isClose   = !isCorrect && !isError && r.verdict === 'partial';

  // ── Run button color ──────────────────────────────────────────────────────
  const runBtn = document.getElementById('run-btn');
  if (isCorrect) {
    runBtn.className = 'btn btn-green';
    runBtn.textContent = '✓ Correct';
  } else if (isClose) {
    runBtn.className = 'btn run-btn-close';
    runBtn.textContent = 'Run ▶';
  } else if (isError) {
    runBtn.className = 'btn btn-ghost';
    runBtn.textContent = 'Run ▶';
  } else {
    runBtn.className = 'btn run-btn-incorrect';
    runBtn.textContent = 'Run ▶';
  }

  // ── Verdict pill ──────────────────────────────────────────────────────────
  const pillEl = document.getElementById('out-verdict-pill');
  if (isCorrect) {
    pillEl.style.display = 'inline';
    pillEl.className = 'out-verdict-pill vp-correct';
    pillEl.textContent = 'Accepted';
  } else if (isClose) {
    pillEl.style.display = 'inline';
    pillEl.className = 'out-verdict-pill vp-close';
    pillEl.textContent = 'Getting closer';
  } else if (!isError) {
    pillEl.style.display = 'inline';
    pillEl.className = 'out-verdict-pill vp-incorrect';
    pillEl.textContent = 'Not quite';
  } else {
    pillEl.style.display = 'none';
  }

  // ── Status dot & title ────────────────────────────────────────────────────
  document.getElementById('out-status').className = 'output-status ' +
    (isError ? 'error' : isCorrect ? 'correct' : isClose ? 'partial' : 'error');
  document.getElementById('out-title').textContent = isError ? 'Error' : 'Output';
  document.getElementById('out-rowcount').textContent = '';

  // ── Results table ─────────────────────────────────────────────────────────
  let outHtml = '';
  if (r.error_message) {
    outHtml += '<div class="error-box">' + esc(r.error_message) + '</div>';
  }
  const cols = r.cols || r.simulated_columns;
  const rows = r.rows || r.simulated_rows;
  if (cols && cols.length && rows && rows.length) {
    outHtml += '<div class="result-table-wrap"><table class="rt"><thead><tr>';
    cols.forEach(function(col) { outHtml += '<th>' + esc(String(col)) + '</th>'; });
    outHtml += '</tr></thead><tbody>';
    rows.forEach(function(row) {
      outHtml += '<tr>';
      (Array.isArray(row) ? row : Object.values(row)).forEach(function(v) {
        outHtml += '<td>' + (v === null || v === undefined ? '<span style="color:var(--dim)">NULL</span>' : esc(String(v))) + '</td>';
      });
      outHtml += '</tr>';
    });
    outHtml += '</tbody></table></div>';
    if (r.row_note) outHtml += '<div class="rt-note">' + esc(r.row_note) + '</div>';
    document.getElementById('out-rowcount').textContent = rows.length + ' row' + (rows.length !== 1 ? 's' : '');
  } else if (!r.error_message) {
    outHtml += '<div class="empty-output">Query returned no rows.</div>';
  }

  // Show model answer inline in output if correct
  if (isCorrect && r.model_answer) {
    if (question) question.model_answer_cache = r.model_answer;
    outHtml += buildModelAnswerHtml(r.model_answer);
  }
  document.getElementById('out-body').innerHTML = outHtml;

  // ── Inline hints below output ─────────────────────────────────────────────
  const hintsArea = document.getElementById('out-hints-area');
  if (!isCorrect && !isError && hints.length > 0) {
    hintsArea.style.display = 'block';
    const show = Math.min(hintShown, hints.length);
    let hHtml = '';
    for (let i = 0; i < show; i++) {
      hHtml += '<div class="out-hint-row">' + esc(hints[i]) + '</div>';
    }
    if (hintShown < hints.length) {
      hHtml += '<div style="margin-top:4px"><button class="btn btn-ghost" style="font-size:11px;padding:3px 10px" onclick="showNextHint()">Next hint (' + (hints.length - hintShown) + ' remaining)</button></div>';
    }
    hintsArea.innerHTML = hHtml;
  } else {
    hintsArea.style.display = 'none';
  }

  // Update feedback pane if open (concept guide)
  if (isCorrect) {
    const newLevel = getLevel(currentCategory);
    const fpane = document.getElementById('feedback-pane');
    if (fpane.style.display !== 'none') {
      document.getElementById('fb-title').textContent = 'Correct — Level ' + newLevel + '!';
      document.getElementById('fb-status').className = 'output-status correct';
    }
  }
}

function showNextHint() {
  hintShown++;
  updateHintBtn();
  // Re-render hints area without re-running query — rebuild from last result
  const hintsArea = document.getElementById('out-hints-area');
  if (!hintsArea) return;
  const show = Math.min(hintShown, hints.length);
  let hHtml = '';
  for (let i = 0; i < show; i++) {
    hHtml += '<div class="out-hint-row">' + esc(hints[i]) + '</div>';
  }
  if (hintShown < hints.length) {
    hHtml += '<div style="margin-top:4px"><button class="btn btn-ghost" style="font-size:11px;padding:3px 10px" onclick="showNextHint()">Next hint (' + (hints.length - hintShown) + ' remaining)</button></div>';
  }
  hintsArea.innerHTML = hHtml;
}

function handleTab(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.target, s = el.selectionStart, end = el.selectionEnd;
    el.value = el.value.substring(0,s) + '  ' + el.value.substring(end);
    el.selectionStart = el.selectionEnd = s + 2;
    updateLineNumbers();
  }
}

function esc(s) {
  if (typeof s !== 'string') return (s === null || s === undefined) ? '' : String(s);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Resize handle ─────────────────────────────────────────────────────────────
function initResize() {
  const handle = document.getElementById('resize-handle');
  const outputPane = document.getElementById('output-pane');
  if (!handle || !outputPane) return;
  let startY = 0, startH = 0, dragging = false;
  handle.addEventListener('mousedown', function(e) {
    dragging = true; startY = e.clientY; startH = outputPane.offsetHeight;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'ns-resize';
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    outputPane.style.height = Math.max(60, Math.min(600, startH + (startY - e.clientY))) + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false; handle.classList.remove('dragging');
    document.body.style.userSelect = ''; document.body.style.cursor = '';
  });
}

// ── callClaude ────────────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: MODEL, max_tokens: maxTokens || 900,
      messages: [{ role: 'user', content: prompt }] }),
  });
  if (!r.ok) throw new Error('API ' + r.status);
  const d = await r.json();
  if (d.stop_reason === 'max_tokens') throw new Error('Response truncated - try again.');
  const raw = (d.content && d.content[0] && d.content[0].text) ? d.content[0].text : '';
  const text = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
  const objStart = text.indexOf('{'), arrStart = text.indexOf('[');
  let jsonStart = -1;
  if (objStart === -1 && arrStart === -1) throw new Error('No JSON in response.');
  if (objStart === -1) jsonStart = arrStart;
  else if (arrStart === -1) jsonStart = objStart;
  else jsonStart = Math.min(objStart, arrStart);
  const isArr = (arrStart !== -1 && (objStart === -1 || arrStart < objStart));
  const jsonEnd = text.lastIndexOf(isArr ? ']' : '}');
  if (jsonEnd < jsonStart) throw new Error('Malformed JSON.');
  return JSON.parse(text.slice(jsonStart, jsonEnd + 1));
}

  ctes: [["WITH name AS ( query )","Named temp result — lives only for this query"],[", name2 AS ( query )","Chain — comma-separated, no extra WITH"],["Cannot filter on window fn in WHERE","Wrap in CTE, filter outside"],["Recursive: anchor UNION ALL recursive","Hierarchy traversal"],["OPTION (MAXRECURSION n)","Default 100, 0 = unlimited"]],

  nulls: [["IS NULL / IS NOT NULL","Only correct null check"],["COALESCE(a,b,c)","First non-NULL — ANSI standard"],["ISNULL(a,b)","SQL Server only"],["NULLIF(a,b)","NULL if a=b — safe division"],["NULL in aggregates","SUM/AVG/COUNT(col) ignore NULLs, COUNT(*) includes them"]],

function renderRefCategory(cat) {
  const content = document.getElementById('ref-content');
  if (!cat) { content.innerHTML = ''; return; }
  const rows = REF_DATA[cat];
  if (!rows) { content.innerHTML = ''; return; }
  content.innerHTML = rows.map(function(row) {
    return '<div class="ref-row"><div class="ref-kw">' + esc(row[0]) + '</div><div class="ref-desc">' + esc(row[1]) + '</div></div>';
  }).join('');
}
